<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disponibilidad PPOC - Semanal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Style.css">
</head>

<body>

<div class="container py-5">
  <div class="card shadow-lg mx-auto" style="max-width:900px;">
    <div class="card-header text-center py-4">
      <h2>🗓 Disponibilidad Mensual PPOC Montequinto</h2>
      <p class="mb-0 opacity-75">Selecciona semanas y turnos disponibles</p>
    </div>

    <div class="card-body">

      <form id="dispoForm">

        <div class="mb-4">
          <label class="form-label fw-bold">Nombre Completo</label>
          <input type="text" name="nombre" class="form-control form-control-lg" required>
        </div>

        <div class="accordion" id="accordionSemanas"></div>

        <button type="submit" class="btn btn-primary w-100 mt-4 py-3 fw-bold" id="btnSubmit">
          ENVIAR DISPONIBILIDAD
        </button>

        <div id="feedback" class="mt-3 d-none text-center"></div>

      </form>

    </div>
  </div>
</div>

<script src="Script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

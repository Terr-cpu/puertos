    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Disponibilidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .result-card { border: none; border-radius: 10px; }
        .turno-manana { border-left: 5px solid #3498db; background-color: #eaf2f8; }
        .turno-tarde { border-left: 5px solid #f39c12; background-color: #fef9e7; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="card shadow p-4 mb-4">
        <h2 class="text-center mb-4">🔍 Buscador de Voluntarios</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Semana</label>
                <select id="selectSemana" class="form-select">
                    <option value="1">Semana 1</option><option value="2">Semana 2</option>
                    <option value="3">Semana 3</option><option value="4">Semana 4</option>
                    <option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día</label>
                <select id="selectDia" class="form-select">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option>
                    <option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100 fw-bold">BUSCAR DISPONIBILIDAD</button>
            </div>
        </div>
    </div>
    <div id="resultados" class="row g-3"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // MISMA URL QUE EL FORMULARIO
    // Función auxiliar para convertir "HH:MM" a minutos para cálculos
    function horaAMinutos(h) {
        if (!h) return 0;
        const [hh, mm] = h.split(':').map(Number);
        return hh * 60 + mm;
    }

    async function buscar() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const cont = document.getElementById('resultados');
        
        // Mensaje de carga animado
        cont.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <div class="mt-2 text-muted">Generando Cuadrante Inteligente...</div>
            </div>`;

        try {
            // Llamada a la nueva acción "getSmartCuadrante" que creamos en el Code.gs
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${sem}&dia=${dia}`);
            const turnos = await res.json();
            
            cont.innerHTML = ""; // Limpiar contenedor

            if (!turnos || turnos.length === 0) {
                cont.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-warning text-center shadow-sm">
                            No hay voluntarios disponibles para generar turnos el <strong>${dia}</strong> de la <strong>Semana ${sem}</strong>.
                        </div>
                    </div>`;
                return;
            }

            // Generar las tarjetas para cada turno de 2 horas
            turnos.forEach(t => {
                // Si el turno no tiene a nadie con llave, preparamos una alerta
                const alertaLlave = t.necesitaLlave ? 
                    `<div class="alert alert-danger py-2 mb-3 small fw-bold">
                        ⚠️ ATENCIÓN: Este turno no tiene a nadie con LLAVE.
                    </div>` : '';

                // Determinar si el turno es de mañana o tarde para el color (Corte a las 14:00)
                const horaInicio = t.rango.split(' ')[0];
                const esTarde = horaAMinutos(horaInicio) >= 840;
                const claseColor = esTarde ? 'turno-tarde' : 'turno-manana';

                cont.innerHTML += `
                    <div class="col-12 mb-4">
                        <div class="card result-card ${claseColor} shadow-sm">
                            <div class="card-header border-0 bg-transparent d-flex justify-content-between align-items-center pt-3">
                                <h5 class="mb-0 fw-bold text-dark">🕒 Turno: ${t.rango}</h5>
                                <span class="badge ${esTarde ? 'bg-warning text-dark' : 'bg-primary'}">${esTarde ? 'TARDE' : 'MAÑANA'}</span>
                            </div>
                            <div class="card-body">
                                ${alertaLlave}
                                <div class="row">
                                    <div class="col-md-7">
                                        <p class="text-muted small fw-bold mb-2">EQUIPO ASIGNADO (Máx. 4):</p>
                                        <div class="list-group shadow-sm">
                                            ${t.equipo.map(v => `
                                                <div class="list-group-item d-flex justify-content-between align-items-center">
                                                    <span>${v.nombre}</span>
                                                    ${v.llave ? '<span class="badge bg-dark">🔑 TIENE LLAVE</span>' : ''}
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <div class="col-md-5 mt-3 mt-md-0 border-start">
                                        <p class="text-muted small fw-bold mb-2">POSIBLES SUSTITUTOS:</p>
                                        <div class="d-flex flex-wrap gap-2">
                                            ${t.sustitutos.length > 0 ? 
                                                t.sustitutos.map(s => `<span class="badge bg-white text-dark border p-2">${s}</span>`).join('') : 
                                                '<span class="text-muted small italic">No hay más voluntarios disponibles</span>'}
                                        </div>
                                        <p class="mt-3 small text-muted">
                                            * Los sustitutos son voluntarios que podrían cubrir este horario pero no fueron asignados para evitar saturación semanal.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

        } catch (error) {
            console.error(error);
            cont.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger text-center">
                        Error al conectar con el sistema. Verifica la URL de Apps Script y que tengas conexión.
                    </div>
                </div>`;
        }
    }
    
</script>
</body>
</html>

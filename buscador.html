   <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inteligente con Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .result-card { border: none; border-radius: 10px; margin-bottom: 20px; }
        .turno-manana { border-left: 5px solid #3498db; background-color: #eaf2f8; }
        .turno-tarde { border-left: 5px solid #f39c12; background-color: #fef9e7; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow p-4 mb-4">
        <h2 class="text-center mb-4">🔍 Generador de Cuadrante</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Semana</label>
                <select id="selectSemana" class="form-select">
                    <option value="1">Semana 1</option><option value="2">Semana 2</option>
                    <option value="3">Semana 3</option><option value="4">Semana 4</option><option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día</label>
                <select id="selectDia" class="form-select">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100 fw-bold">GENERAR TURNOS</button>
            </div>
        </div>
        <button id="btnConfirmar" onclick="confirmarYGuardar()" class="btn btn-success w-100 mt-3 fw-bold d-none">
            ✅ CONFIRMAR Y BLOQUEAR VOLUNTARIOS PARA ESTA SEMANA
        </button>
    </div>

    <div id="resultados" class="row"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // REEMPLAZA ESTO

    async function buscar() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const cont = document.getElementById('resultados');
        cont.innerHTML = '<div class="text-center w-100">Analizando disponibilidad...</div>';

        try {
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${sem}&dia=${dia}`);
            const turnos = await res.json();
            cont.innerHTML = "";

            turnos.forEach((t, index) => {
                const esTarde = parseInt(t.rango.split(':')[0]) >= 14;
                const alertaLlave = t.necesitaLlave ? `<div class="alert alert-danger p-2 mb-2 small fw-bold">⚠️ ATENCIÓN: TURNO SIN RESPONSABLE DE LLAVE</div>` : '';

                cont.innerHTML += `
                    <div class="col-12 mb-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                                <h5 class="mb-0 fw-bold">🕒 Turno: ${t.rango}</h5>
                                <button onclick="confirmarTurnoIndividual('${t.rango}', ${index})" class="btn btn-sm btn-success fw-bold">✅ Confirmar este turno</button>
                            </div>
                            <div class="card-body">
                                ${alertaLlave}
                                <div class="row">
                                    <div class="col-md-7">
                                        <p class="small fw-bold text-muted mb-2">TITULARES:</p>
                                        <div class="list-group">
                                            ${t.equipo.map(v => `
                                                <div class="list-group-item d-flex justify-content-between align-items-center">
                                                    <span>${v.nombre}</span>
                                                    ${v.llave ? '<span class="badge bg-dark text-white p-2">🔑 TIENE LLAVE</span>' : ''}
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <div class="col-md-5 border-start">
                                        <p class="small fw-bold text-muted mb-2">SUSTITUTOS / OCUPADOS:</p>
                                        <div class="d-flex flex-wrap gap-1">
                                            ${t.sustitutos.map(s => `<span class="badge bg-white text-dark border">${s}</span>`).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            // Guardamos los datos para poder confirmarlos luego
            window.datosTurnos = turnos;
        } catch (e) { cont.innerHTML = "Error al cargar."; }
    }

    async function confirmarTurnoIndividual(rango, index) {
        const turno = window.datosTurnos[index];
        const nombres = turno.equipo.map(v => v.nombre);
        
        if (!confirm(`¿Confirmar el turno ${rango} con ${nombres.length} voluntarios?`)) return;

        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;

        try {
            await fetch(`${API_URL}?action=confirmarTurnos`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    semana: sem,
                    dia: dia,
                    asignados: nombres
                })
            });
            alert("Turno guardado y voluntarios bloqueados.");
            buscar(); // Recargar para que los bloqueados aparezcan como "Ocupados"
        } catch (e) { alert("Error al guardar."); }
    }
</script>
</body>
</html>

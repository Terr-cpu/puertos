<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Maestro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .turno-manana { border-left: 10px solid #0d6efd; background-color: #ffffff; }
        .turno-tarde { border-left: 10px solid #fd7e14; background-color: #ffffff; }
        .card-turno { border-radius: 12px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .badge-llave { background-color: #212529; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; }
        .alert-sin-llave { background-color: #fff2f2; border: 1px solid #ffc1c1; color: #b02a37; border-radius: 8px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    <div class="card shadow-sm p-4 mb-4 border-0">
        <h2 class="text-center fw-bold text-primary mb-4">🗓️ Planificador Mensual</h2>
        <div class="d-grid gap-2">
            <button onclick="proyectarMes()" class="btn btn-primary btn-lg fw-bold">🚀 GENERAR CUADRANTE DEL MES</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="toggleManual()">Opciones de búsqueda manual</button>
        </div>

        <div id="manual-search" class="row g-2 mt-3 d-none">
            <div class="col-5"><select id="sem" class="form-select"><option value="1">Semana 1</option><option value="2">Semana 2</option><option value="3">Semana 3</option><option value="4">Semana 4</option><option value="5">Semana 5</option></select></div>
            <div class="col-5"><select id="dia" class="form-select"><option value="Lunes">Lunes</option><option value="Martes">Martes</option><option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option><option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option></select></div>
            <div class="col-2"><button onclick="buscarDia()" class="btn btn-dark w-100">IR</button></div>
        </div>
    </div>

    <div id="resultados"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; 

    function toggleManual() { document.getElementById('manual-search').classList.toggle('d-none'); }

    async function proyectarMes() {
        const resCont = document.getElementById('resultados');
        resCont.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2">Repartiendo voluntarios equitativamente...</p></div>';
        
        try {
            const res = await fetch(`${API_URL}?action=getCuadranteMensual`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            
            resCont.innerHTML = "";
            data.forEach(dia => {
                resCont.innerHTML += `<h3 class="fw-bold mt-5 mb-3">📅 ${dia.fechaLabel}</h3>`;
                renderTurnos(dia.turnos, dia.semana, dia.dia, resCont);
            });
        } catch (e) { resCont.innerHTML = `<div class="alert alert-danger">Error: ${e.message}</div>`; }
    }

    async function buscarDia() {
        const s = document.getElementById('sem').value;
        const d = document.getElementById('dia').value;
        const resCont = document.getElementById('resultados');
        resCont.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
        try {
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${s}&dia=${d}`);
            const turnos = await res.json();
            resCont.innerHTML = `<h3 class="fw-bold mt-4">Resultados para ${d} (Semana ${s})</h3>`;
            renderTurnos(turnos, s, d, resCont);
        } catch (e) { resCont.innerHTML = "Error de conexión."; }
    }

    function renderTurnos(turnos, sem, dia, container) {
        if (!turnos || turnos.length === 0) {
            container.innerHTML += '<div class="alert alert-light border text-center">No hay voluntarios suficientes para cubrir turnos efectivos este día.</div>';
            return;
        }

        turnos.forEach(t => {
            const esTarde = parseInt(t.rango.split(':')[0]) >= 14;
            container.innerHTML += `
            <div class="card card-turno ${esTarde ? 'turno-tarde' : 'turno-manana'} shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0">🕒 ${t.rango}</h5>
                        <button class="btn btn-sm btn-success fw-bold" onclick="confirmar('${sem}', '${dia}', '${t.equipo.map(e=>e.nombre).join(',')}')">CONFIRMAR EQUIPO</button>
                    </div>
                    
                    ${t.necesitaLlave ? '<div class="alert-sin-llave mb-3 small text-center">⚠️ ATENCIÓN: Nadie tiene llave en este equipo</div>' : ''}
                    
                    <div class="row">
                        ${t.equipo.map(v => `
                            <div class="col-6 mb-2">
                                <div class="p-2 border rounded d-flex justify-content-between align-items-center bg-white">
                                    <span class="small fw-bold">${v.nombre}</span>
                                    ${v.llave ? '<span class="badge-llave text-uppercase" style="font-size:10px">Llave</span>' : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        });
    }

    async function confirmar(s, d, nombres) {
        if (!confirm("¿Bloquear estos voluntarios para el resto de la semana?")) return;
        try {
            await fetch(`${API_URL}?action=confirmarTurnos`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ semana: s, dia: d, asignados: nombres.split(',') })
            });
            alert("¡Turno bloqueado con éxito!");
        } catch (e) { alert("Error al guardar."); }
    }
</script>
</body>
</html>

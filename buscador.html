   <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Turnos - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .turno-manana { border-left: 10px solid #007bff !important; background-color: #f0f7ff; }
        .turno-tarde { border-left: 10px solid #fd7e14 !important; background-color: #fffaf5; }
        .badge-llave { background-color: #212529; color: white; padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .card-turno { border: none; border-radius: 15px; margin-bottom: 20px; transition: 0.3s; }
        .nav-pills .nav-link.active { background-color: #0d6efd; box-shadow: 0 4px 10px rgba(13,110,253,0.3); }
        .alert-llave { background-color: #f8d7da; border: none; color: #842029; font-weight: bold; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 1000px;">
    <div class="card shadow p-4 mb-4 border-0" style="border-radius: 20px;">
        <h2 class="text-center mb-4 fw-bold text-primary">🗓️ Planificador de Turnos</h2>
        
        <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active fw-bold" data-bs-toggle="pill" data-bs-target="#tab-mes">PROYECTAR MES COMPLETO</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold" data-bs-toggle="pill" data-bs-target="#tab-dia">BÚSQUEDA POR DÍA</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <div class="tab-pane fade show active" id="tab-mes">
                <p class="text-muted text-center">Genera automáticamente la propuesta para todos los días con "SI" en el calendario.</p>
                <button onclick="proyectarMes()" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">🚀 GENERAR CUADRANTE MENSUAL</button>
            </div>

            <div class="tab-pane fade" id="tab-dia">
                <div class="row g-2">
                    <div class="col-md-5">
                        <select id="selectSemana" class="form-select">
                            <option value="1">Semana 1</option><option value="2">Semana 2</option>
                            <option value="3">Semana 3</option><option value="4">Semana 4</option><option value="5">Semana 5</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <select id="selectDia" class="form-select">
                            <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                            <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                            <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button onclick="buscarDia()" class="btn btn-primary w-100 fw-bold">VER</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="resultados" class="row"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; 

   async function proyectarMes() {
        const resCont = document.getElementById('resultados');
        resCont.innerHTML = `
            <div class="text-center w-100 py-5">
                <div class="spinner-grow text-primary"></div>
                <h4 class="mt-3">Optimizando reparto mensual...</h4>
                <p class="text-muted small">El sistema está equilibrando turnos y evitando repeticiones semanales.</p>
            </div>`;
        
        try {
            const res = await fetch(`${API_URL}?action=getCuadranteMensual`);
            const plan = await res.json();
            resCont.innerHTML = "";

            if (plan.length === 0) {
                resCont.innerHTML = '<div class="alert alert-warning">No hay días marcados con "SI" en la hoja Calendario.</div>';
                return;
            }

            plan.forEach(dia => {
                let htmlDia = `
                <div class="col-12 mt-5">
                    <div class="d-flex align-items-center mb-3">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width:50px; height:50px; font-weight:bold;">
                            ${dia.fechaLabel.split('/')[0]}
                        </div>
                        <h2 class="mb-0 fw-bold">${dia.fechaLabel} <span class="text-muted fs-5">(Semana ${dia.semana})</span></h2>
                    </div>
                </div>`;
                resCont.innerHTML += htmlDia;
                renderizarTurnos(dia.turnos, dia.semana, dia.dia, resCont);
            });
        } catch (e) { 
            resCont.innerHTML = '<div class="alert alert-danger">Error al generar el plan mensual. Revisa la conexión.</div>';
        }
    }

    async function buscarDia() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const resCont = document.getElementById('resultados');
        resCont.innerHTML = '<div class="text-center w-100 py-5"><div class="spinner-border text-primary"></div></div>';

        try {
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${sem}&dia=${dia}`);
            const turnos = await res.json();
            resCont.innerHTML = "";
            renderizarTurnos(turnos, sem, dia);
        } catch (e) { resCont.innerHTML = "Error."; }
    }

    function renderizarTurnos(turnos, semana, diaNombre) {
        const resCont = document.getElementById('resultados');
        if (turnos.length === 0) {
            resCont.innerHTML += '<div class="alert alert-light text-center w-100 border small">Sin voluntarios suficientes para este día.</div>';
            return;
        }

        turnos.forEach((t, i) => {
            const horaH = parseInt(t.rango.split(':')[0]);
            const esTarde = horaH >= 14;
            
            resCont.innerHTML += `
            <div class="col-12 mb-4">
                <div class="card card-turno ${esTarde ? 'turno-tarde' : 'turno-manana'} shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <h4 class="fw-bold mb-0">🕒 Turno: ${t.rango}</h4>
                                <span class="badge ${esTarde ? 'bg-warning text-dark' : 'bg-primary'}">${esTarde ? 'TARDE' : 'MAÑANA'}</span>
                            </div>
                            <button onclick="confirmarIndividual('${semana}', '${diaNombre}', ${JSON.stringify(t.equipo.map(e=>e.nombre)).replace(/"/g, '&quot;')})" class="btn btn-success fw-bold px-4">CONFIRMAR EQUIPO</button>
                        </div>

                        ${t.necesitaLlave ? '<div class="alert-llave">⚠️ ATENCIÓN: Este turno no tiene a nadie con LLAVE.</div>' : ''}

                        <div class="row">
                            <div class="col-md-7">
                                <p class="small fw-bold text-muted mb-2">EQUIPO ASIGNADO:</p>
                                <div class="list-group shadow-sm">
                                    ${t.equipo.map(v => `
                                        <div class="list-group-item d-flex justify-content-between align-items-center border-0 border-bottom">
                                            <span class="fw-bold">${v.nombre}</span>
                                            ${v.llave ? '<span class="badge-llave">🔑 TIENE LLAVE</span>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="col-md-5 mt-3 mt-md-0">
                                <p class="small fw-bold text-muted mb-2">OTROS DISPONIBLES:</p>
                                <div class="d-flex flex-wrap gap-1">
                                    ${t.sustitutos.map(s => `<span class="badge bg-white text-dark border p-2 fw-normal">${s}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        });
    }

    async function confirmarIndividual(semana, dia, nombresArray) {
        if (!confirm("¿Deseas confirmar este turno y bloquear a los voluntarios para el resto de la semana?")) return;
        
        try {
            await fetch(`${API_URL}?action=confirmarTurnos`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ semana: semana, dia: dia, asignados: nombresArray })
            });
            alert("Turno guardado. Refresca para actualizar disponibilidades.");
        } catch (e) { alert("Error al guardar."); }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

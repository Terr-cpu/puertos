   <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inteligente con Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .result-card { border: none; border-radius: 10px; margin-bottom: 20px; }
        .turno-manana { border-left: 5px solid #3498db; background-color: #eaf2f8; }
        .turno-tarde { border-left: 5px solid #f39c12; background-color: #fef9e7; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow p-4 mb-4">
        <h2 class="text-center mb-4">🔍 Generador de Cuadrante</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Semana</label>
                <select id="selectSemana" class="form-select">
                    <option value="1">Semana 1</option><option value="2">Semana 2</option>
                    <option value="3">Semana 3</option><option value="4">Semana 4</option><option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día</label>
                <select id="selectDia" class="form-select">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100 fw-bold">GENERAR TURNOS</button>
            </div>
        </div>
        <button id="btnConfirmar" onclick="confirmarYGuardar()" class="btn btn-success w-100 mt-3 fw-bold d-none">
            ✅ CONFIRMAR Y BLOQUEAR VOLUNTARIOS PARA ESTA SEMANA
        </button>
    </div>

    <div id="resultados" class="row"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // REEMPLAZA ESTO
    let turnosGlobales = [];

    async function buscar() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const cont = document.getElementById('resultados');
        cont.innerHTML = "Cargando...";

        try {
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${sem}&dia=${dia}`);
            turnosGlobales = await res.json();
            cont.innerHTML = "";

            if (turnosGlobales.length === 0) {
                cont.innerHTML = '<div class="alert alert-warning">No hay voluntarios suficientes.</div>';
                document.getElementById('btnConfirmar').classList.add('d-none');
                return;
            }

            document.getElementById('btnConfirmar').classList.remove('d-none');

            turnosGlobales.forEach(t => {
                const esTarde = parseInt(t.rango.split(':')[0]) >= 14;
                cont.innerHTML += `
                    <div class="col-12 card result-card ${esTarde?'turno-tarde':'turno-manana'} p-3 shadow-sm">
                        <div class="d-flex justify-content-between">
                            <h5 class="fw-bold">🕒 Turno: ${t.rango}</h5>
                            ${t.necesitaLlave ? '<span class="badge bg-danger">⚠️ SIN LLAVE</span>' : ''}
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <strong>Titulares:</strong>
                                <ul class="list-group list-group-flush">
                                    ${t.equipo.map(v => `<li class="list-group-item">${v.nombre} ${v.llave?'🔑':''}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="col-md-6 border-start">
                                <small class="text-muted">Sustitutos/Ya asignados:</small><br>
                                ${t.sustitutos.map(s => `<span class="badge bg-light text-dark border me-1">${s}</span>`).join('')}
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { alert("Error al conectar"); }
    }

    async function confirmarYGuardar() {
        if (!confirm("¿Confirmar estos turnos? Se guardarán en el historial.")) return;

        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const nombres = [];
        turnosGlobales.forEach(t => t.equipo.forEach(v => nombres.push(v.nombre)));

        const btn = document.getElementById('btnConfirmar');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        try {
            await fetch(`${API_URL}?action=confirmarTurnos`, {
                method: 'POST',
                mode: 'no-cors', // Importante para Apps Script
                body: JSON.stringify({ semana: sem, dia: dia, asignados: nombres })
            });
            alert("¡Guardado! Ahora el sistema recordará que estos voluntarios ya han trabajado esta semana.");
            buscar();
        } catch (e) { alert("Error al guardar"); }
        btn.disabled = false;
        btn.innerText = "✅ CONFIRMAR Y BLOQUEAR VOLUNTARIOS";
    }
</script>
</body>
</html>

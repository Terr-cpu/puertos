
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Disponibilidad PPOC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .search-card { border: none; border-radius: 15px; }
        
        /* Estilos base para las tarjetas de resultado */
        .result-card { 
            border: none; 
            border-radius: 10px; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Colores diferenciadores */
        .turno-manana {
            border-left: 5px solid #3498db; /* Azul para mañana */
            background-color: #eaf2f8;
        }
        .turno-tarde {
            border-left: 5px solid #f39c12; /* Naranja/Amarillo para tarde */
            background-color: #fef9e7;
        }

        .hora-destacada { font-size: 1.1rem; color: #2c3e50; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="card shadow search-card p-4 mb-4">
        <h2 class="text-center mb-4 text-primary">🗓 Consultar Disponibilidad</h2>
        <p class="text-center text-muted mb-4">Selecciona la semana y el día para ver quién está disponible y en qué horario.</p>
        <div class="row g-3 justify-content-center">
            <div class="col-md-4">
                <label class="form-label fw-bold">Semana</label>
                <select id="selectSemana" class="form-select form-select-lg">
                    <option value="1">Semana 1</option>
                    <option value="2">Semana 2</option>
                    <option value="3">Semana 3</option>
                    <option value="4">Semana 4</option>
                    <option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día</label>
                <select id="selectDia" class="form-select form-select-lg">
                    <option value="Lunes">Lunes</option>
                    <option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option>
                    <option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option>
                    <option value="Sabado">Sábado</option>
                    <option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary btn-lg w-100 fw-bold">BUSCAR</button>
            </div>
        </div>
    </div>

    <div id="resultados" class="row g-3"></div>
</div>

<script>
    // Reemplaza esto con la URL real de tu Google Apps Script (la misma que usas en el formulario)
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; 

    // Función auxiliar para convertir "HH:MM" a minutos totales desde las 00:00
    // Esto nos permite comparar y ordenar horas numéricamente.
    function horaAMinutos(horaStr) {
        if (!horaStr) return 0;
        const [horas, minutos] = horaStr.split(':').map(Number);
        return (horas * 60) + minutos;
    }

    async function buscar() {
        const semana = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const contenedor = document.getElementById('resultados');
        
        // Mostrar mensaje de carga
        contenedor.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <div class="mt-2 text-muted">Consultando disponibilidad en tiempo real...</div>
            </div>`;

        try {
            // Realizar la petición GET al Apps Script
            const response = await fetch(`${API_URL}?action=getDispo&semana=${semana}&dia=${dia}`);
            
            if (!response.ok) { throw new Error("Error en la respuesta de la red"); }
            
            let data = await response.json();

            contenedor.innerHTML = ""; // Limpiar mensaje de carga

            if (!data || data.length === 0) {
                contenedor.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-warning text-center shadow-sm">
                            No hay nadie disponible registrado para el <strong>${dia}</strong> de la <strong>Semana ${semana}</strong>.
                        </div>
                    </div>`;
                return;
            }

            // --- 1. LÓGICA DE ORDENACIÓN ---
            // Ordenar los datos por la hora de INICIO (ascendente)
            data.sort((a, b) => {
                // Extraer la hora de inicio del string "08:00 a 14:00"
                const horaInicioA = a.horario.split(' a ')[0];
                const horaInicioB = b.horario.split(' a ')[0];
                return horaAMinutos(horaInicioA) - horaAMinutos(horaInicioB);
            });

            // --- 2. LÓGICA DE VISUALIZACIÓN Y COLOR ---
            data.forEach(persona => {
                // Extraer hora de inicio para determinar el color
                const horaInicioStr = persona.horario.split(' a ')[0];
                const minutosInicio = horaAMinutos(horaInicioStr);
                const minutosCorteTarde = 14 * 60; // 14:00 en minutos (840)

                // Determinar la clase de CSS según si es antes o después de las 14:00
                const claseTurno = (minutosInicio >= minutosCorteTarde) ? 'turno-tarde' : 'turno-manana';
                const textoTurno = (minutosInicio >= minutosCorteTarde) ? 'Tarde' : 'Mañana';

                // Crear la tarjeta de resultado
                contenedor.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card result-card ${claseTurno} p-3 shadow-sm h-100">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0 text-dark fw-bold">${persona.nombre}</h5>
                                <span class="badge ${minutosInicio >= minutosCorteTarde ? 'bg-warning text-dark' : 'bg-primary'} rounded-pill">${textoTurno}</span>
                            </div>
                            <p class="mb-0hora-destacada">
                                🕒 <span class="fw-semibold">${persona.horario}</span>
                            </p>
                        </div>
                    </div>`;
            });

        } catch (error) {
            console.error("Error:", error);
            contenedor.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger text-center shadow-sm">
                        ❌ Ocurrió un error al conectar con la base de datos de Google Sheets. 
                        Por favor, inténtalo de nuevo más tarde o contacta con el administrador.
                    </div>
                </div>`;
        }
    }
</script>
</body>
</html>

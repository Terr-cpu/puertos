<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Disponibilidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .result-card { border-left: 5px solid #3498db; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow-sm p-4 mb-4">
        <h2 class="text-center mb-4">🔍 Buscador de Disponibilidad</h2>
        <div class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Semana</label>
                <select id="selectSemana" class="form-select">
                    <option value="1">Semana 1</option>
                    <option value="2">Semana 2</option>
                    <option value="3">Semana 3</option>
                    <option value="4">Semana 4</option>
                    <option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-5">
                <label class="form-label">Día</label>
                <select id="selectDia" class="form-select">
                    <option value="Lunes">Lunes</option>
                    <option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option>
                    <option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option>
                    <option value="Sabado">Sábado</option>
                    <option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100">BUSCAR</button>
            </div>
        </div>
    </div>

    <div id="resultados" class="row"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // Usa la misma que el formulario

    async function buscar() {
        const semana = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const contenedor = document.getElementById('resultados');
        
        contenedor.innerHTML = '<div class="text-center">Cargando disponibilidad...</div>';

        try {
            const response = await fetch(`${API_URL}?action=getDispo&semana=${semana}&dia=${dia}`);
            const data = await response.json();

            contenedor.innerHTML = "";

            if (data.length === 0) {
                contenedor.innerHTML = '<div class="alert alert-warning text-center">No hay nadie disponible para este día.</div>';
                return;
            }

            data.forEach(persona => {
                contenedor.innerHTML += `
                    <div class="col-md-4">
                        <div class="card result-card p-3 shadow-sm">
                            <h5 class="mb-1">${persona.nombre}</h5>
                            <p class="text-muted mb-0">🕒 Horario: <strong>${persona.horario}</strong></p>
                        </div>
                    </div>`;
            });
        } catch (error) {
            contenedor.innerHTML = '<div class="alert alert-danger">Error al conectar con la base de datos.</div>';
        }
    }
</script>
</body>
</html>

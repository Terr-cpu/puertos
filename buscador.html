   <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inteligente con Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .result-card { border: none; border-radius: 10px; margin-bottom: 20px; }
       .turno-manana { border-left: 8px solid #007bff !important; background-color: #f0f7ff; }
    .turno-tarde { border-left: 8px solid #fd7e14 !important; background-color: #fffaf5; }
    .badge-llave { background-color: #343a40; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
    .card-turno { border: 1px solid #ddd; border-radius: 12px; transition: 0.3s; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow p-4 mb-4">
        <h2 class="text-center mb-4">🔍 Generador de Cuadrante</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Semana</label>
                <select id="selectSemana" class="form-select">
                    <option value="1">Semana 1</option><option value="2">Semana 2</option>
                    <option value="3">Semana 3</option><option value="4">Semana 4</option><option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día</label>
                <select id="selectDia" class="form-select">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100 fw-bold">GENERAR TURNOS</button>
            </div>
        </div>
        <button id="btnConfirmar" onclick="confirmarYGuardar()" class="btn btn-success w-100 mt-3 fw-bold d-none">
            ✅ CONFIRMAR Y BLOQUEAR VOLUNTARIOS PARA ESTA SEMANA
        </button>
    </div>

    <div id="resultados" class="row"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // REEMPLAZA ESTO

<script>
    async function buscar() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const cont = document.getElementById('resultados');
        cont.innerHTML = '<div class="col-12 text-center">Buscando turnos viables (mín. 3 personas)...</div>';

        try {
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${sem}&dia=${dia}`);
            const turnos = await res.json();
            cont.innerHTML = "";
            window.datosTurnos = turnos;

            if (turnos.length === 0) {
                cont.innerHTML = '<div class="alert alert-info">No hay turnos viables con al menos 3 personas libres esta semana.</div>';
                return;
            }

            turnos.forEach((t, index) => {
                const horaH = parseInt(t.rango.split(':')[0]);
                const claseColor = horaH < 14 ? 'turno-manana' : 'turno-tarde';
                
                cont.innerHTML += `
                <div class="col-12 mb-4">
                    <div class="card card-turno ${claseColor} shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h4 class="fw-bold mb-0">🕒 ${t.rango}</h4>
                                    <span class="badge ${horaH < 14 ? 'bg-primary' : 'bg-warning text-dark'}">${horaH < 14 ? 'MAÑANA' : 'TARDE'}</span>
                                </div>
                                <button onclick="confirmarTurnoIndividual('${t.rango}', ${index})" class="btn btn-success fw-bold">Confirmar Turno</button>
                            </div>
                            
                            ${t.necesitaLlave ? '<div class="alert alert-danger py-1 px-2 mb-3 small fw-bold text-center">⚠️ TURNO SIN RESPONSABLE DE LLAVE</div>' : ''}

                            <div class="row">
                                <div class="col-md-7">
                                    <p class="small fw-bold text-secondary mb-2">EQUIPO PRINCIPAL:</p>
                                    <div class="list-group shadow-sm">
                                        ${t.equipo.map(v => `
                                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                                <span class="fw-bold">${v.nombre}</span>
                                                ${v.llave ? '<span class="badge-llave">🔑 TIENE LLAVE</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="col-md-5 mt-3 mt-md-0">
                                    <p class="small fw-bold text-secondary mb-2">SUSTITUTOS / YA ASIGNADOS:</p>
                                    <div class="d-flex flex-wrap gap-1">
                                        ${t.sustitutos.map(s => `<span class="badge bg-white text-dark border">${s}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        } catch (e) { cont.innerHTML = "Error de conexión."; }
    }

    async function confirmarTurnoIndividual(rango, index) {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const nombres = window.datosTurnos[index].equipo.map(v => v.nombre);

        if (!confirm(`¿Confirmar turno de las ${rango}? Estos voluntarios no aparecerán más esta semana.`)) return;

        try {
            await fetch(`${API_URL}?action=confirmarTurnos`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ semana: sem, dia: dia, asignados: nombres })
            });
            alert("Turno bloqueado correctamente.");
            buscar(); // Recargar para limpiar la lista
        } catch (e) { alert("Error al guardar."); }
    }
</script>
</body>
</html>

    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Disponibilidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .result-card { border: none; border-radius: 10px; }
        .turno-manana { border-left: 5px solid #3498db; background-color: #eaf2f8; }
        .turno-tarde { border-left: 5px solid #f39c12; background-color: #fef9e7; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="card shadow p-4 mb-4">
        <h2 class="text-center mb-4">🔍 Buscador de Voluntarios</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Semana</label>
                <select id="selectSemana" class="form-select">
                    <option value="1">Semana 1</option><option value="2">Semana 2</option>
                    <option value="3">Semana 3</option><option value="4">Semana 4</option>
                    <option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día</label>
                <select id="selectDia" class="form-select">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option>
                    <option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100 fw-bold">BUSCAR DISPONIBILIDAD</button>
            </div>
        </div>
    </div>
    <div id="resultados" class="row g-3"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // MISMA URL QUE EL FORMULARIO

    function horaAMinutos(h) {
        const [hh, mm] = h.split(':').map(Number);
        return hh * 60 + mm;
    }

    async function buscar() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const cont = document.getElementById('resultados');
        cont.innerHTML = '<div class="text-center w-100">Cargando...</div>';

        try {
            const res = await fetch(`${API_URL}?action=getDispo&semana=${sem}&dia=${dia}`);
            let data = await res.json();
            cont.innerHTML = "";

            if (data.length === 0) {
                cont.innerHTML = '<div class="alert alert-warning text-center w-100">Nadie disponible.</div>';
                return;
            }

            // Ordenar por hora de inicio
            data.sort((a, b) => horaAMinutos(a.horario.split(' ')[0]) - horaAMinutos(b.horario.split(' ')[0]));

            data.forEach(p => {
                const horaIn = p.horario.split(' ')[0];
                const esTarde = horaAMinutos(horaIn) >= 840; // 14:00
                const badgeColor = p.totalDispo <= 3 ? 'bg-success' : 'bg-secondary';

                cont.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card result-card ${esTarde?'turno-tarde':'turno-manana'} p-3 shadow-sm h-100">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0 fw-bold">${p.nombre}</h5>
                                <span class="badge ${badgeColor}">${p.totalDispo} turnos/mes</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fs-5">🕒 ${p.horario}</span>
                                <small class="fw-bold text-muted">${esTarde?'TARDE':'MAÑANA'}</small>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { cont.innerHTML = '<div class="alert alert-danger w-100">Error de conexión.</div>'; }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Inteligente de Turnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; }
        .turno-manana { border-left: 8px solid #007bff !important; background-color: #f0f7ff; }
        .turno-tarde { border-left: 8px solid #fd7e14 !important; background-color: #fffaf5; }
        .badge-llave { background-color: #212529; color: #fff; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; }
        .card-turno { border: none; border-radius: 15px; margin-bottom: 25px; transition: transform 0.2s; }
        .card-turno:hover { transform: translateY(-3px); }
        .titulares-list .list-group-item { border: none; border-bottom: 1px solid #eee; background: transparent; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-sm p-4 mb-5 border-0" style="border-radius: 15px;">
        <h2 class="text-center fw-bold mb-4">🗓️ Generador de Turnos Efectivos</h2>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Seleccionar Semana</label>
                <select id="selectSemana" class="form-select border-primary">
                    <option value="1">Semana 1</option><option value="2">Semana 2</option>
                    <option value="3">Semana 3</option><option value="4">Semana 4</option><option value="5">Semana 5</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Día de la Semana</label>
                <select id="selectDia" class="form-select border-primary">
                    <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                    <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option><option value="Domingo">Domingo</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button onclick="buscar()" class="btn btn-primary w-100 fw-bold py-2">🔍 BUSCAR TURNOS</button>
            </div>
        </div>
    </div>

    <div id="resultados" class="row"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec"; // <--- PEGA TU URL DE APPS SCRIPT AQUÍ
    let datosTurnos = [];

    async function buscar() {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const cont = document.getElementById('resultados');
        
        cont.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Calculando disponibilidad y llaves...</p>
            </div>`;

        try {
            const res = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${sem}&dia=${dia}`);
            datosTurnos = await res.json();
            cont.innerHTML = "";

            if (datosTurnos.length === 0) {
                cont.innerHTML = '<div class="alert alert-info text-center shadow-sm">No se encontraron turnos viables (mín. 3 personas) para este día.</div>';
                return;
            }

            datosTurnos.forEach((t, index) => {
                const horaH = parseInt(t.rango.split(':')[0]);
                const esTarde = horaH >= 14;
                const claseColor = esTarde ? 'turno-tarde' : 'turno-manana';
                
                cont.innerHTML += `
                <div class="col-12 mb-4">
                    <div class="card card-turno ${claseColor} shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div>
                                    <h3 class="fw-bold mb-0">🕒 ${t.rango}</h3>
                                    <span class="badge ${esTarde ? 'bg-warning text-dark' : 'bg-primary'}">${esTarde ? 'TARDE' : 'MAÑANA'}</span>
                                </div>
                                <button onclick="confirmarTurno('${t.rango}', ${index})" class="btn btn-success px-4 fw-bold shadow-sm">CONFIRMAR TURNO</button>
                            </div>
                            
                            ${t.necesitaLlave ? '<div class="alert alert-danger py-2 text-center fw-bold">⚠️ ESTE TURNO REQUIERE ALGUIEN CON LLAVE</div>' : ''}

                            <div class="row">
                                <div class="col-md-7">
                                    <h6 class="text-uppercase text-muted fw-bold mb-3 small">Equipo Principal (Asignado)</h6>
                                    <div class="list-group titulares-list shadow-sm">
                                        ${t.equipo.map(v => `
                                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                                <span class="fw-bold fs-5">${v.nombre}</span>
                                                ${v.llave ? '<span class="badge-llave">🔑 TIENE LLAVE</span>' : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="col-md-5 mt-4 mt-md-0">
                                    <h6 class="text-uppercase text-muted fw-bold mb-3 small">Banquillo / Otros disponibles</h6>
                                    <div class="d-flex flex-wrap gap-2">
                                        ${t.sustitutos.map(s => `<span class="badge bg-white text-dark border p-2">${s}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        } catch (e) {
            cont.innerHTML = '<div class="alert alert-danger">Error de conexión con el servidor.</div>';
        }
    }

    async function confirmarTurno(rango, index) {
        const sem = document.getElementById('selectSemana').value;
        const dia = document.getElementById('selectDia').value;
        const nombres = datosTurnos[index].equipo.map(v => v.nombre);

        if (!confirm(`¿Confirmar turno ${rango}?\n\nLos voluntarios: ${nombres.join(', ')} serán bloqueados para el resto de la semana.`)) return;

        try {
            await fetch(`${API_URL}?action=confirmarTurnos`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ semana: sem, dia: dia, asignados: nombres })
            });
            alert("¡Turno confirmado y guardado en Historial!");
            buscar(); // Recargar para actualizar bloqueos
        } catch (e) {
            alert("Error al guardar en el historial.");
        }
    }
</script>

</body>
</html>

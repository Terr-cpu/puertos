<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Puerto de Sevilla · Gestión de Turnos</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════════ */
:root {
  --bg:         #f0f2f5;
  --surface:    #ffffff;
  --surface2:   #f5f7fa;
  --navy:       #0a1628;
  --ocean:      #0d2a4a;
  --blue:       #0071e3;
  --blue-soft:  #ddeeff;
  --amber:      #e07b00;
  --amber-soft: #fff3e0;
  --gold:       #c9a84c;
  --gold-soft:  #fff8e7;
  --green:      #1a9648;
  --green-soft: #e6f7ed;
  --red:        #d93025;
  --red-soft:   #fce8e6;
  --label1:     #1a1a2e;
  --label2:     #44475a;
  --label3:     #8a8fa8;
  --label4:     #c8ccd8;
  --sep:        rgba(0,0,0,0.08);
  --shadow-sm:  0 1px 4px rgba(0,0,0,0.07);
  --shadow-md:  0 4px 20px rgba(0,0,0,0.09);
  --shadow-lg:  0 12px 40px rgba(0,0,0,0.13);
  --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 26px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
html { scroll-behavior: smooth; }
body { background: var(--bg); font-family: 'Sora', system-ui, sans-serif; color: var(--label1); min-height: 100vh; }

/* ══════════════════════════════════════════════════════════
   SIDEBAR LAYOUT
══════════════════════════════════════════════════════════ */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--navy);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100; transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 1.75rem 1.25rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logo .logo-icon { font-size: 1.8rem; margin-bottom: 0.35rem; }
.sidebar-logo h2 { font-family: 'DM Serif Display', serif; font-size: 1rem; color: #fff; line-height: 1.2; }
.sidebar-logo p { font-size: 0.68rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.2rem; }

.nav-section { padding: 1rem 0.75rem 0.5rem; }
.nav-label { font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.15em; padding: 0 0.5rem; margin-bottom: 0.35rem; }
.nav-item {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.65rem 0.75rem; border-radius: var(--r-md);
  font-size: 0.83rem; font-weight: 500; color: rgba(255,255,255,0.55);
  cursor: pointer; transition: all 0.18s ease; margin-bottom: 0.15rem;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.nav-item.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 600; }
.nav-item .ni { font-size: 1rem; flex-shrink: 0; }
.nav-item .badge { margin-left: auto; background: var(--red); color: #fff; font-size: 0.6rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 10px; min-width: 18px; text-align: center; }

.sidebar-footer { margin-top: auto; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.07); }
.sidebar-footer p { font-size: 0.68rem; color: rgba(255,255,255,0.2); }

.main-area { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* Header superior */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--sep);
  padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm);
}
.topbar-title { font-size: 1.05rem; font-weight: 700; color: var(--label1); }
.topbar-actions { display: flex; gap: 0.5rem; }

.content { padding: 1.75rem 2rem; flex: 1; }

/* ══════════════════════════════════════════════════════════
   BOTONES
══════════════════════════════════════════════════════════ */
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: var(--r-md); font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s ease; white-space: nowrap; }
.btn-primary { background: var(--navy); color: #fff; }
.btn-primary:hover { background: #152540; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(10,22,40,0.3); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: #0062c4; transform: translateY(-1px); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #157a3a; transform: translateY(-1px); }
.btn-ghost { background: var(--surface2); color: var(--label2); border: 1px solid var(--sep); }
.btn-ghost:hover { background: #eaedf2; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #b5261f; }
.btn-sm { padding: 0.38rem 0.75rem; font-size: 0.75rem; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

/* ══════════════════════════════════════════════════════════
   CARDS / PANELS
══════════════════════════════════════════════════════════ */
.card { background: var(--surface); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--sep); overflow: hidden; }
.card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--sep); display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
.card-header h3 { font-size: 0.88rem; font-weight: 700; color: var(--label1); }
.card-body { padding: 1.25rem; }

/* ══════════════════════════════════════════════════════════
   INPUTS / FORMS
══════════════════════════════════════════════════════════ */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.35rem; }
.form-group label { font-size: 0.72rem; font-weight: 700; color: var(--label3); text-transform: uppercase; letter-spacing: 0.06em; }
.form-control { border: 1.5px solid var(--sep); border-radius: var(--r-sm); padding: 0.55rem 0.8rem; font-family: inherit; font-size: 0.85rem; color: var(--label1); background: var(--surface); outline: none; transition: border-color 0.15s; width: 100%; }
.form-control:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
select.form-control { cursor: pointer; }

/* ══════════════════════════════════════════════════════════
   LOADING
══════════════════════════════════════════════════════════ */
.loading { text-align: center; padding: 4rem 0; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--sep); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(--label3); font-size: 0.85rem; }
.empty-state { text-align: center; padding: 4rem 1rem; }
.empty-state .ei { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.3; }
.empty-state h4 { font-size: 0.95rem; font-weight: 600; color: var(--label2); margin-bottom: 0.4rem; }
.empty-state p { font-size: 0.82rem; color: var(--label3); }

/* ══════════════════════════════════════════════════════════
   TAB CUADRANTE — DÍA
══════════════════════════════════════════════════════════ */
.dia-block { margin-bottom: 1.5rem; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.dia-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.6rem 0; margin-bottom: 0.6rem;
  border-bottom: 2px solid var(--navy);
}
.dia-fecha { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--navy); }
.dia-tag { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.18rem 0.55rem; border-radius: 5px; background: var(--navy); color: var(--gold); }
.dia-tag.conf { background: var(--green); color: #fff; }

.aviso-bar { background: var(--amber-soft); border-left: 3px solid var(--amber); border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: 0.5rem 0.85rem; font-size: 0.78rem; font-weight: 600; color: #7a4500; margin-bottom: 0.6rem; }

.no-turno-box { background: var(--surface); border: 1.5px dashed var(--label4); border-radius: var(--r-lg); padding: 1.25rem; text-align: center; margin-bottom: 0.5rem; }
.no-turno-box p { font-size: 0.82rem; color: var(--label3); margin-bottom: 0.35rem; }

/* ── Turno card ── */
.turno-card {
  background: var(--surface); border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm); border: 1px solid var(--sep);
  margin-bottom: 0.6rem; overflow: visible;
  transition: box-shadow 0.2s, transform 0.2s;
}
.turno-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.turno-accent { height: 3px; }
.acc-m { background: linear-gradient(90deg,#0071e3,#34aadc); }
.acc-t { background: linear-gradient(90deg,#e07b00,#ffcc00); }

.turno-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 0.85rem 1rem 0.4rem; gap: 0.75rem; flex-wrap: wrap;
}
.turno-hora { font-size: 1.1rem; font-weight: 800; color: var(--label1); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.turno-tipo { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 4px; margin-top: 0.3rem; display: block; }
.tt-m { background: var(--blue-soft); color: var(--blue); }
.tt-t { background: var(--amber-soft); color: var(--amber); }
.tt-conf { background: var(--green-soft); color: var(--green); }

.turno-acciones { display: flex; gap: 0.4rem; flex-wrap: wrap; }

/* ── GRID EQUIPO + DISPONIBLES ── */
.turno-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; padding: 0 1rem 1rem;
}
@media (max-width:600px) { .turno-grid { grid-template-columns:1fr; } }
.tg-col-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--label3); margin-bottom: 0.45rem; }
.tg-right { border-left: 1px solid var(--sep); padding-left: 0.85rem; }
.tg-left  { padding-right: 0.85rem; }

/* ── VOLUNTARIO ROW (equipo) — DRAGGABLE TARGET ── */
.v-slot {
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--surface2); border-radius: var(--r-sm);
  padding: 0.45rem 0.6rem; margin-bottom: 0.3rem;
  border: 1.5px solid transparent;
  transition: all 0.15s ease; min-height: 42px;
  position: relative;
}
.v-slot.drag-over {
  border-color: var(--blue); background: var(--blue-soft);
  transform: scale(1.01);
}
.v-slot.dropping { animation: pulse-drop 0.3s ease; }
@keyframes pulse-drop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }

.v-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--navy); color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
  text-transform: uppercase;
}
.v-name { font-size: 0.8rem; font-weight: 600; color: var(--label1); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v-meta { font-size: 0.63rem; color: var(--label3); }
.v-horario-small { font-size: 0.6rem; color: var(--blue); font-weight: 600; }
.badge-llave { background: var(--navy); color: var(--gold); font-size: 0.55rem; font-weight: 700; padding: 0.12rem 0.4rem; border-radius: 4px; flex-shrink: 0; }

/* ── CHIP DISPONIBLE — DRAGGABLE ── */
.disp-wrap { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.disp-chip {
  display: inline-flex; align-items: center; gap: 0.25rem;
  padding: 0.28rem 0.6rem; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600; border: 1.5px solid transparent;
  cursor: grab; user-select: none;
  transition: all 0.15s ease;
}
.disp-chip:active { cursor: grabbing; transform: scale(0.97); }
.disp-chip.dragging { opacity: 0.4; transform: scale(0.95); }
.dc-ok       { background: var(--green-soft); color: #1a7a3a; border-color: #b0dcc0; }
.dc-reducido { background: var(--amber-soft); color: #7a4500; border-color: #ffc87a; }
.dc-reservado{ background: var(--blue-soft);  color: #0050a0; border-color: #90c4f0; }
.dc-bloqueado{ background: var(--surface2);   color: var(--label4); border-color: var(--sep); cursor: default; }
.disp-chip .dc-hora { font-size: 0.58rem; opacity: 0.7; margin-left: 0.15rem; }

/* Panel colapsable disponibilidad */
.dispo-panel { background: var(--surface); border-radius: var(--r-md); border: 1px solid var(--sep); margin-bottom: 0.5rem; }
.dispo-toggle { width: 100%; background: none; border: none; padding: 0.6rem 0.85rem; display: flex; align-items: center; justify-content: space-between; font-family: inherit; font-size: 0.75rem; font-weight: 600; color: var(--label3); cursor: pointer; text-align: left; }
.dispo-toggle:hover { background: var(--surface2); }
.dispo-arrow { transition: transform 0.2s; font-size: 0.65rem; }
.dispo-toggle.open .dispo-arrow { transform: rotate(180deg); }
.dispo-body { display: none; padding: 0 0.75rem 0.75rem; flex-wrap: wrap; gap: 0.3rem; }
.dispo-body.visible { display: flex; }

/* ══════════════════════════════════════════════════════════
   TAB ALERTAS
══════════════════════════════════════════════════════════ */
.alerta-item { display: flex; align-items: center; gap: 0.85rem; background: var(--surface); border-radius: var(--r-lg); padding: 0.85rem 1.1rem; margin-bottom: 0.5rem; box-shadow: var(--shadow-sm); border-left: 4px solid; animation: fadeUp 0.3s ease both; }
.alerta-item.grave { border-color: var(--red); background: var(--red-soft); }
.alerta-item.aviso { border-color: var(--amber); background: var(--amber-soft); }
.alerta-item .ai-icon { font-size: 1.4rem; flex-shrink: 0; }
.alerta-item .ai-info .ai-fecha { font-size: 0.78rem; font-weight: 700; color: var(--label2); }
.alerta-item .ai-info .ai-msg   { font-size: 0.78rem; color: var(--label3); margin-top: 0.15rem; }

/* ══════════════════════════════════════════════════════════
   TAB CARGA
══════════════════════════════════════════════════════════ */
.stats-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat-box { background: var(--surface); border-radius: var(--r-lg); padding: 1rem 1.25rem; flex: 1; min-width: 100px; box-shadow: var(--shadow-sm); text-align: center; }
.stat-box .sv { font-size: 1.6rem; font-weight: 800; color: var(--navy); letter-spacing: -0.03em; }
.stat-box .sl { font-size: 0.65rem; font-weight: 700; color: var(--label3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.15rem; }
.vol-bar-row { display: flex; align-items: center; gap: 0.75rem; background: var(--surface); border-radius: var(--r-md); padding: 0.7rem 1rem; margin-bottom: 0.35rem; box-shadow: var(--shadow-sm); animation: fadeUp 0.3s ease both; }
.vol-cnt { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
.lv-alto   .vol-cnt { background: var(--red-soft); color: var(--red); }
.lv-normal .vol-cnt { background: var(--green-soft); color: var(--green); }
.lv-bajo   .vol-cnt { background: var(--amber-soft); color: var(--amber); }
.vol-nm { flex: 1; font-size: 0.83rem; font-weight: 600; color: var(--label1); }
.bar-track { flex: 1; height: 5px; background: var(--sep); border-radius: 3px; min-width: 50px; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.lv-alto   .bar-fill { background: var(--red); }
.lv-normal .bar-fill { background: var(--green); }
.lv-bajo   .bar-fill { background: var(--amber); }
.vol-llave-badge { font-size: 0.58rem; background: var(--navy); color: var(--gold); padding: 0.1rem 0.4rem; border-radius: 4px; flex-shrink: 0; }

/* ══════════════════════════════════════════════════════════
   TAB VOLUNTARIOS
══════════════════════════════════════════════════════════ */
.vol-list-row { display: flex; align-items: center; gap: 0.75rem; background: var(--surface); border-radius: var(--r-md); padding: 0.7rem 1rem; margin-bottom: 0.35rem; box-shadow: var(--shadow-sm); }
.vol-list-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
.vol-list-info { flex: 1; }
.vol-list-info .vli-name { font-size: 0.85rem; font-weight: 600; color: var(--label1); }
.vol-list-info .vli-meta { font-size: 0.7rem; color: var(--label3); margin-top: 0.1rem; }
.vol-list-actions { display: flex; gap: 0.35rem; }

/* ══════════════════════════════════════════════════════════
   TAB HISTORIAL
══════════════════════════════════════════════════════════ */
.hist-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.hist-table th { background: var(--surface2); padding: 0.6rem 0.75rem; text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--label3); border-bottom: 1px solid var(--sep); }
.hist-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--sep); color: var(--label2); }
.hist-table tr:last-child td { border-bottom: none; }
.hist-table tr:hover td { background: var(--surface2); }

/* ══════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--surface); border-radius: var(--r-xl); padding: 1.75rem; width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: modalIn 0.28s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes modalIn { from { opacity:0; transform:scale(0.92) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.modal-head h3 { font-size: 1rem; font-weight: 700; color: var(--label1); }
.modal-close { background: var(--surface2); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; color: var(--label3); }
.modal-close:hover { background: var(--sep); }

/* Cubre modal rows */
.cubre-row { display: flex; align-items: center; gap: 0.65rem; background: var(--surface2); border-radius: var(--r-md); padding: 0.6rem 0.8rem; margin-bottom: 0.35rem; }
.cubre-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.est-disponible { background: var(--green); }
.est-reducido   { background: var(--amber); }
.est-bloqueado  { background: var(--label4); }
.cubre-info { flex: 1; }
.cubre-nombre { font-size: 0.83rem; font-weight: 600; color: var(--label1); }
.cubre-meta   { font-size: 0.67rem; color: var(--label3); margin-top: 0.06rem; }
.cubre-section-label { font-size: 0.68rem; font-weight: 700; color: var(--label3); text-transform: uppercase; letter-spacing: 0.08em; margin: 0.75rem 0 0.4rem; }

/* ══════════════════════════════════════════════════════════
   CUADRANTE IMPRIMIBLE
══════════════════════════════════════════════════════════ */
#cuadrante-print { display: none; }
@media print {
  .layout { display: block; }
  .sidebar, .topbar, .content { display: none; }
  #cuadrante-print { display: block; }
}
.print-wrap { max-width: 800px; margin: 0 auto; font-family: Arial, sans-serif; }
.print-titulo { text-align: center; font-size: 18px; font-weight: bold; color: #1a56a0; border-bottom: 3px solid #1a56a0; padding-bottom: 8px; margin-bottom: 20px; letter-spacing: 1px; }
.print-dia-block { display: flex; gap: 0; margin-bottom: 4px; border: 1px solid #dde; border-radius: 8px; overflow: hidden; }
.print-dia-info { width: 180px; flex-shrink: 0; background: #f0f4fa; padding: 12px 14px; border-right: 1px solid #dde; }
.print-dia-info .pdi-fecha { font-size: 16px; font-weight: bold; color: #1a56a0; }
.print-dia-info .pdi-barco { font-size: 10px; color: #5580a0; margin-top: 6px; line-height: 1.4; background: #e6eef8; border-radius: 4px; padding: 4px 6px; }
.print-dia-info .pdi-lugar { font-size: 10px; color: #888; margin-top: 4px; }
.print-turnos { flex: 1; }
.print-turno-row { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #eee; }
.print-turno-row:last-child { border-bottom: none; }
.ptr-hora { width: 100px; flex-shrink: 0; }
.ptr-hora .ph-label { font-size: 9px; color: #888; text-transform: uppercase; }

<script>
const API = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec";

// ══════════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════════════════
const state = {
  cuadrante: null,       // datos del mes
  turnosEditados: {},    // { key: [equipoActual] } — cambios por drag
  dragData: null,        // voluntario siendo arrastrado
};

// ══════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════
const TABS = ['cuadrante','alertas','carga','voluntarios','historial'];
const TITULOS = {
  cuadrante: '📅 Cuadrante mensual',
  alertas:   '🔑 Alertas de llave',
  carga:     '📊 Balance de carga',
  voluntarios:'👥 Voluntarios',
  historial: '📋 Historial de turnos',
};
const ACCIONES = {
  cuadrante: `<button class="btn btn-ghost btn-sm" onclick="imprimirCuadrante()">🖨️ Imprimir</button>
               <button class="btn btn-primary btn-sm" onclick="exportarCuadrante()">📋 Exportar</button>
               <button class="btn btn-blue btn-sm" onclick="recargarCuadrante()">↻ Recalcular</button>`,
  alertas:   `<button class="btn btn-ghost btn-sm" onclick="cargarAlertas(true)">↻ Actualizar</button>`,
  carga:     `<button class="btn btn-ghost btn-sm" onclick="cargarCarga(true)">↻ Actualizar</button>`,
  voluntarios:`<button class="btn btn-green btn-sm" onclick="abrirModalVol()">+ Añadir voluntario</button>`,
  historial: `<button class="btn btn-ghost btn-sm" onclick="cargarHistorial(true)">↻ Actualizar</button>`,
};

let tabActual = 'cuadrante';
function setTab(id) {
  TABS.forEach(t => {
    document.getElementById('tab-'+t).style.display = t===id ? 'block' : 'none';
    document.getElementById('nav-'+t).classList.toggle('active', t===id);
  });
  document.getElementById('topbar-title').textContent = TITULOS[id] || '';
  document.getElementById('topbar-actions').innerHTML = ACCIONES[id] || '';
  tabActual = id;
  if (id==='cuadrante'   && !state.cuadrante)     cargarCuadrante();
  if (id==='alertas'     && !window._alertasOk)   cargarAlertas();
  if (id==='carga'       && !window._cargaOk)      cargarCarga();
  if (id==='voluntarios' && !window._volsOk)       cargarVoluntarios();
  if (id==='historial'   && !window._histOk)       cargarHistorial();
}

// ══════════════════════════════════════════════════════════
//  API HELPERS
// ══════════════════════════════════════════════════════════
async function apiGet(params) {
  const url = API + '?' + new URLSearchParams(params);
  const r = await fetch(url, { redirect:'follow', headers:{Accept:'application/json'} });
  const txt = await r.text();
  return JSON.parse(txt.trim().replace(/^[^\[{]+/,''));
}
async function apiPost(body) {
  await fetch(API, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
}

// ══════════════════════════════════════════════════════════
//  CUADRANTE
// ══════════════════════════════════════════════════════════
async function cargarCuadrante() {
  const cont = document.getElementById('tab-cuadrante');
  cont.innerHTML = `<div class="loading"><div class="spinner"></div><p>Calculando cuadrante mensual…</p></div>`;
  try {
    const data = await apiGet({action:'getCuadranteMensual'});
    if (data.error) throw new Error(data.error);
    state.cuadrante = data;
    state.turnosEditados = {};
    renderCuadrante(cont);
  } catch(e) {
    cont.innerHTML = `<div class="empty-state"><span class="ei">⚠️</span><h4>Error al cargar</h4><p>${e.message}</p></div>`;
  }
}

function recargarCuadrante() {
  state.cuadrante = null;
  window._alertasOk = false;
  window._cargaOk = false;
  cargarCuadrante();
}

function renderCuadrante(cont) {
  cont.innerHTML = '';
  if (!state.cuadrante || !state.cuadrante.length) {
    cont.innerHTML = `<div class="empty-state"><span class="ei">📭</span><h4>Sin días configurados</h4></div>`;
    return;
  }
  state.cuadrante.forEach((d, i) => {
    const el = renderDia(d);
    el.style.animationDelay = (i*0.04)+'s';
    cont.appendChild(el);
  });
}

function renderDia(d) {
  const block = document.createElement('div');
  block.className = 'dia-block';
  block.id = `dia-${d.fechaRaw}`;
  const turnos = d.turnos || [];
  const conf = d.confirmado || false;

  block.innerHTML = `
    <div class="dia-header">
      <span class="dia-fecha">📅 ${d.fechaLabel}</span>
      <span class="dia-tag ${conf?'conf':''}">${conf?'✓ ':''} ${turnos.length} turno${turnos.length!==1?'s':''}</span>
    </div>`;

  if (d.diagnostico?.aviso) {
    block.insertAdjacentHTML('beforeend', `<div class="aviso-bar">${d.diagnostico.aviso}</div>`);
  }

  if (!turnos.length) {
    block.insertAdjacentHTML('beforeend', `
      <div class="no-turno-box">
        <p>⚠️ Sin franja de 2h con ≥3 voluntarios disponibles.</p>
        <p style="font-size:0.75rem">Disponibles: ${d.diagnostico?.totalDisponibles||0} · Aptos: ${d.diagnostico?.aptos||0}</p>
      </div>`);
  } else {
    turnos.forEach(t => block.appendChild(renderTurno(t, d)));
  }

  if (d.diagnostico?.todos?.length) {
    block.appendChild(renderDispoPanel(d.diagnostico.todos, d));
  }
  return block;
}

// ══════════════════════════════════════════════════════════
//  RENDERIZAR TURNO (con drag & drop)
// ══════════════════════════════════════════════════════════
function renderTurno(t, d) {
  const hIni  = parseInt(t.rango.split(':')[0]);
  const tarde = hIni >= 14;
  const conf  = t.confirmado || d.confirmado;
  const key   = `${d.semana}|${d.dia}|${t.rango}`;

  // Usar equipo editado si existe
  const equipo = state.turnosEditados[key]
    ? state.turnosEditados[key]
    : (t.equipo || []);

  const card = document.createElement('div');
  card.className = 'turno-card';

  // Franja sin llave
  if (t.sinLlave) {
    card.innerHTML = `
      <div class="turno-accent" style="background:#f5a400"></div>
      <div class="turno-top">
        <div><div class="turno-hora">🕒 ${t.rango}</div><span class="turno-tipo" style="background:#fff3cc;color:#7a5000">SIN LLAVE</span></div>
      </div>
      <div style="padding:0 1rem 1rem;font-size:0.8rem;color:#7a5000;">
        ⚠️ Ningún portador de llave disponible en esta franja.
      </div>`;
    return card;
  }

  const btnConfId = `btn-${d.semana}-${d.dia}-${hIni}`;
  const tipoTxt = conf ? 'CONFIRMADO' : tarde ? 'TARDE' : 'MAÑANA';
  const tipoCls = conf ? 'tt-conf' : tarde ? 'tt-t' : 'tt-m';

  card.innerHTML = `
    <div class="turno-accent ${tarde?'acc-t':'acc-m'}"></div>
    <div class="turno-top">
      <div>
        <div class="turno-hora">🕒 ${t.rango}</div>
        <span class="turno-tipo ${tipoCls}">${tipoTxt}</span>
      </div>
      <div class="turno-acciones">
        ${!conf ? `
        <button class="btn btn-ghost btn-sm" onclick="abrirCubre('${d.semana}','${d.dia}','${t.rango}')">🔄 Cubrir</button>
        <button class="btn btn-green btn-sm" id="${btnConfId}"
          onclick="confirmarTurno('${d.semana}','${d.dia}','${key}','${t.rango}',${d.fechaRaw||'null'},'${btnConfId}')">
          ✓ Confirmar
        </button>` : '<span style="font-size:0.75rem;color:var(--green);font-weight:700;">✓ Guardado</span>'}
      </div>
    </div>
    <div class="turno-grid">
      <div class="tg-left">
        <div class="tg-col-label">Equipo asignado (${equipo.length})</div>
        <div id="equipo-${key.replace(/[|:]/g,'-')}">
          ${equipo.map((v,i) => renderSlot(v, key, i, conf)).join('')}
        </div>
      </div>
      <div class="tg-right">
        <div class="tg-col-label">Disponibles adicionales (${t.sustitutos?.length||0})</div>
        <div class="disp-wrap" id="sust-${key.replace(/[|:]/g,'-')}">
          ${(t.sustitutos||[]).map(s => renderDispChip(s, key)).join('')}
        </div>
      </div>
    </div>`;

  // Activar drop zones en los slots
  setTimeout(() => activarDropZones(key, t, d), 0);
  return card;
}

// ── Slot de voluntario en equipo (drop target)
function renderSlot(v, key, idx, conf) {
  const iniciales = v.nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
  return `
    <div class="v-slot" id="slot-${key.replace(/[|:]/g,'-')}-${idx}"
         data-key="${key}" data-idx="${idx}" ${conf?'':'ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,\''+key+'\','+idx+')"'}>
      <div class="v-avatar">${iniciales}</div>
      <div style="flex:1;min-width:0;">
        <div class="v-name">${v.nombre}</div>
        <div class="v-meta">${v.dias>=99?'Nuevo':v.dias+' d descanso'}${v.dispo?' · '+v.dispo+' d/mes':''}</div>
        ${v.horario?`<div class="v-horario-small">🕐 ${v.horario}</div>`:''}
      </div>
      ${v.llave?'<span class="badge-llave">🔑 Llave</span>':''}
    </div>`;
}

// ── Chip disponible (draggable)
function renderDispChip(s, turnoKey) {
  const cls = s.dias<2?'dc-bloqueado':s.dias<5?'dc-reducido':'dc-ok';
  const draggable = s.dias >= 2 ? 'draggable="true"' : '';
  return `
    <span class="disp-chip ${cls}" ${draggable}
      data-nombre="${s.nombre}" data-llave="${s.llave}" data-dias="${s.dias}" data-dispo="${s.dispo||0}" data-horario="${s.horario||''}"
      data-turno-key="${turnoKey}"
      ${s.dias>=2?`ondragstart="onDragStart(event)" ondragend="onDragEnd(event)"`:''}
      title="${s.horario?'🕐 '+s.horario:''}">
      ${s.llave?'🔑 ':''}${s.nombre}
      ${s.horario?`<span class="dc-hora">🕐 ${s.horario}</span>`:''}
    </span>`;
}

// ══════════════════════════════════════════════════════════
//  DRAG & DROP
// ══════════════════════════════════════════════════════════
function onDragStart(e) {
  const chip = e.currentTarget;
  state.dragData = {
    nombre:   chip.dataset.nombre,
    llave:    chip.dataset.llave === 'true',
    dias:     parseInt(chip.dataset.dias),
    dispo:    parseInt(chip.dataset.dispo),
    horario:  chip.dataset.horario,
    turnoKey: chip.dataset.turnoKey,
  };
  chip.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', chip.dataset.nombre);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  state.dragData = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, turnoKey, slotIdx) {
  e.preventDefault();
  const slot = e.currentTarget;
  slot.classList.remove('drag-over');

  if (!state.dragData) return;
  const nuevo = state.dragData;

  // Obtener equipo actual (editado o original)
  const diaData = state.cuadrante.find(d =>
    d.turnos && d.turnos.some(t => `${d.semana}|${d.dia}|${t.rango}` === turnoKey)
  );
  if (!diaData) return;
  const turnoOrig = diaData.turnos.find(t => `${diaData.semana}|${diaData.dia}|${t.rango}` === turnoKey);
  if (!turnoOrig) return;

  const equipoActual = state.turnosEditados[turnoKey]
    ? [...state.turnosEditados[turnoKey]]
    : [...(turnoOrig.equipo || [])];

  // Verificar que el voluntario no esté ya en el equipo
  if (equipoActual.some(v => v.nombre === nuevo.nombre)) {
    toast('Este voluntario ya está en el equipo', 'err');
    return;
  }

  // Sustituir el slot
  const sustituido = equipoActual[slotIdx];
  equipoActual[slotIdx] = {
    nombre: nuevo.nombre,
    llave: nuevo.llave,
    dias: nuevo.dias,
    dispo: nuevo.dispo,
    horario: nuevo.horario,
  };

  state.turnosEditados[turnoKey] = equipoActual;

  // Animar y re-renderizar el equipo
  slot.classList.add('dropping');
  setTimeout(() => {
    const equipoEl = document.getElementById(`equipo-${turnoKey.replace(/[|:]/g,'-')}`);
    if (equipoEl) {
      equipoEl.innerHTML = equipoActual.map((v,i) => renderSlot(v, turnoKey, i, false)).join('');
      activarDropZones(turnoKey, turnoOrig, diaData);
    }

    // Quitar el chip sustituido de sustitutos y añadir el sustituido como disponible
    const sustEl = document.getElementById(`sust-${turnoKey.replace(/[|:]/g,'-')}`);
    if (sustEl && sustituido) {
      // Añadir sustituido como chip disponible
      const chipSust = document.createElement('span');
      chipSust.className = 'disp-chip dc-ok';
      chipSust.innerHTML = `${sustituido.llave?'🔑 ':''}${sustituido.nombre}`;
      chipSust.title = 'Sustituido';
      sustEl.appendChild(chipSust);
    }

    // Eliminar el chip dragged
    const chips = document.querySelectorAll(`.disp-chip[data-nombre="${nuevo.nombre}"][data-turno-key="${turnoKey}"]`);
    chips.forEach(c => c.remove());

    slot.classList.remove('dropping');
  }, 150);

  toast(`${nuevo.nombre} sustituye a ${sustituido?.nombre || 'voluntario'}`, 'ok');
}

function activarDropZones(key, turnoOrig, d) {
  const equipoActual = state.turnosEditados[key] || (turnoOrig.equipo || []);
  equipoActual.forEach((_, i) => {
    const slot = document.getElementById(`slot-${key.replace(/[|:]/g,'-')}-${i}`);
    if (slot && !d.confirmado && !turnoOrig.confirmado) {
      slot.ondragover = (e) => onDragOver(e);
      slot.ondragleave = (e) => onDragLeave(e);
      slot.ondrop = (e) => onDrop(e, key, i);
    }
  });
}

// ══════════════════════════════════════════════════════════
//  CONFIRMAR TURNO
// ══════════════════════════════════════════════════════════
async function confirmarTurno(semana, dia, key, rango, fechaRaw, btnId) {
  const equipo = state.turnosEditados[key]
    ? state.turnosEditados[key].map(v => v.nombre)
    : (() => {
        const d = state.cuadrante.find(d => d.semana==semana && d.dia==dia);
        const t = d?.turnos?.find(t => t.rango===rango);
        return t?.equipo?.map(v => v.nombre) || [];
      })();

  if (!equipo.length) { toast('Sin equipo asignado', 'err'); return; }
  if (!confirm(`¿Confirmar turno ${rango} con: ${equipo.join(', ')}?`)) return;

  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

  try {
    await apiPost({ accion:'confirmarTurno', semana, dia, asignados: equipo, rango,
      fecha: fechaRaw ? new Date(fechaRaw).toISOString() : new Date().toISOString() });
    if (btn) { btn.textContent = '✓ Guardado'; btn.classList.add('saved'); }
    window._cargaOk = false;
    toast('Turno confirmado y guardado ✓', 'ok');
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '✓ Confirmar'; }
    toast('Error: ' + e.message, 'err');
  }
}

// ══════════════════════════════════════════════════════════
//  PANEL DISPONIBILIDAD
// ══════════════════════════════════════════════════════════
function renderDispoPanel(todos, d) {
  const wrap = document.createElement('div');
  wrap.className = 'dispo-panel';
  const lbl = { ok:'✅', reducido:'⚡', reservado:'📌', bloqueado:'🔒' };
  const counts = todos.reduce((a,v) => { a[v.estado]=(a[v.estado]||0)+1; return a; }, {});
  const resumen = Object.entries(counts).map(([k,n]) => `${lbl[k]||''} ${n} ${k}`).join(' · ');
  const pid = `dp-${d.fechaRaw}`;
  wrap.innerHTML = `
    <button class="dispo-toggle" onclick="toggleDispo('${pid}',this)">
      <span>👥 Todos los disponibles (${todos.length}) — ${resumen}</span>
      <span class="dispo-arrow">▼</span>
    </button>
    <div class="dispo-body" id="${pid}">
      ${todos.map(v => {
        const cls = {ok:'dc-ok',reducido:'dc-reducido',reservado:'dc-reservado',bloqueado:'dc-bloqueado'}[v.estado]||'dc-bloqueado';
        return `<span class="disp-chip ${cls}" title="🕐 ${v.horario}">${v.llave?'🔑 ':''}${v.nombre}<span class="dc-hora"> 🕐 ${v.horario}</span></span>`;
      }).join('')}
    </div>`;
  return wrap;
}

function toggleDispo(id, btn) {
  document.getElementById(id).classList.toggle('visible');
  btn.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════
//  ALERTAS
// ══════════════════════════════════════════════════════════
async function cargarAlertas(force) {
  if (window._alertasOk && !force) return;
  const cont = document.getElementById('tab-alertas');
  cont.innerHTML = `<div class="loading"><div class="spinner"></div><p>Comprobando alertas…</p></div>`;
  try {
    const data = await apiGet({action:'getAlertasLlave'});
    if (data.error) throw new Error(data.error);
    cont.innerHTML = '';

    const badge = document.getElementById('badge-alertas');
    if (data.total > 0) { badge.style.display=''; badge.textContent=data.total; }
    else badge.style.display='none';

    if (!data.alertas?.length) {
      cont.innerHTML = `<div class="empty-state"><span class="ei">✅</span><h4>Sin alertas</h4><p>Todos los días tienen portador de llave disponible.</p></div>`;
    } else {
      const intro = document.createElement('p');
      intro.style.cssText = 'font-size:0.83rem;color:var(--label3);margin-bottom:1.25rem;';
      intro.textContent = `${data.total} día${data.total!==1?'s':''} requieren atención:`;
      cont.appendChild(intro);
      data.alertas.forEach((a,i) => {
        const grave = a.mensaje.includes('Ningún');
        const el = document.createElement('div');
        el.className = `alerta-item ${grave?'grave':'aviso'}`;
        el.style.animationDelay = (i*0.05)+'s';
        el.innerHTML = `
          <div class="ai-icon">${grave?'🔴':'🟡'}</div>
          <div class="ai-info">
            <div class="ai-fecha">📅 ${a.fecha} — ${a.dia} (Semana ${a.semana})</div>
            <div class="ai-msg">${a.mensaje} · ${a.disponibles} disponible${a.disponibles!==1?'s':''}</div>
          </div>`;
        cont.appendChild(el);
      });
    }
    window._alertasOk = true;
  } catch(e) {
    cont.innerHTML = `<div class="empty-state"><span class="ei">⚠️</span><h4>Error</h4><p>${e.message}</p></div>`;
  }
}

// ══════════════════════════════════════════════════════════
//  CARGA
// ══════════════════════════════════════════════════════════
async function cargarCarga(force) {
  if (window._cargaOk && !force) return;
  const cont = document.getElementById('tab-carga');
  cont.innerHTML = `<div class="loading"><div class="spinner"></div><p>Calculando balance…</p></div>`;
  try {
    const data = await apiGet({action:'getResumenCarga'});
    if (data.error) throw new Error(data.error);
    cont.innerHTML = '';

    const stats = document.createElement('div');
    stats.className = 'stats-row';
    stats.innerHTML = `
      <div class="stat-box"><div class="sv">${data.total}</div><div class="sl">Turnos confirmados</div></div>
      <div class="stat-box"><div class="sv">${data.media}</div><div class="sl">Media / voluntario</div></div>
      <div class="stat-box"><div class="sv">${data.max}</div><div class="sl">Máximo</div></div>
      <div class="stat-box"><div class="sv">${data.min}</div><div class="sl">Mínimo</div></div>`;
    cont.appendChild(stats);

    if (!data.voluntarios?.length) {
      cont.insertAdjacentHTML('beforeend', `<div class="empty-state"><span class="ei">📋</span><h4>Sin datos</h4><p>Confirma turnos para ver el balance.</p></div>`);
      return;
    }

    const ley = document.createElement('div');
    ley.style.cssText = 'display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem;font-size:0.73rem;color:var(--label3);';
    ley.innerHTML = `<span>🟢 Normal</span><span>🔴 Alta (>${Math.ceil(data.media*1.5)} turnos)</span><span>🟡 Baja (<${Math.floor(data.media*0.5)} turnos)</span>`;
    cont.appendChild(ley);

    data.voluntarios.forEach((v,i) => {
      const pct = data.max > 0 ? Math.round((v.turnos/data.max)*100) : 0;
      const el  = document.createElement('div');
      el.className = `vol-bar-row lv-${v.nivel}`;
      el.style.animationDelay = (i*0.03)+'s';
      el.title = v.detalle?.map(d=>`${d.fecha} ${d.dia}: ${d.rango}`).join('\n')||'Sin turnos confirmados';
      el.innerHTML = `
        <div class="vol-cnt">${v.turnos}</div>
        <div class="vol-nm">${v.nombre.split(' ').slice(0,2).join(' ')} ${v.llave?'<span class="vol-llave-badge">🔑</span>':''}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div style="font-size:0.75rem;color:var(--label2);font-weight:600;min-width:50px;text-align:right;">${v.turnos} turno${v.turnos!==1?'s':''}</div>`;
      cont.appendChild(el);
    });
    window._cargaOk = true;
  } catch(e) {
    cont.innerHTML = `<div class="empty-state"><span class="ei">⚠️</span><h4>Error</h4><p>${e.message}</p></div>`;
  }
}

// ══════════════════════════════════════════════════════════
//  VOLUNTARIOS
// ══════════════════════════════════════════════════════════
async function cargarVoluntarios(force) {
  if (window._volsOk && !force) return;
  const cont = document.getElementById('tab-voluntarios');
  cont.innerHTML = `<div class="loading"><div class="spinner"></div><p>Cargando voluntarios…</p></div>`;
  try {
    const [vols, llaves] = await Promise.all([
      apiGet({action:'getVoluntarios'}),
      // Obtener llaves desde un turno cualquiera del cuadrante
      Promise.resolve(state.cuadrante
        ? [...new Set(state.cuadrante.flatMap(d => (d.turnos||[]).flatMap(t => (t.equipo||[]).filter(v=>v.llave).map(v=>v.nombre))))]
        : [])
    ]);
    if (vols.error) throw new Error(vols.error);
    cont.innerHTML = '';
    if (!vols.length) {
      cont.innerHTML = `<div class="empty-state"><span class="ei">👥</span><h4>Sin voluntarios</h4><p>Añade el primero con el botón superior.</p></div>`;
      return;
    }
    const setLlaves = new Set(llaves.map(n=>n.toUpperCase()));
    vols.forEach((nombre, i) => {
      const tieneLlave = setLlaves.has(nombre.toUpperCase());
      const iniciales = nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
      const el = document.createElement('div');
      el.className = 'vol-list-row';
      el.style.animationDelay = (i*0.02)+'s';
      el.innerHTML = `
        <div class="vol-list-avatar">${iniciales}</div>
        <div class="vol-list-info">
          <div class="vli-name">${nombre} ${tieneLlave?'<span style="font-size:0.6rem;background:var(--navy);color:var(--gold);padding:0.1rem 0.4rem;border-radius:4px;">🔑 Llave</span>':''}</div>
          <div class="vli-meta">${tieneLlave?'Portador de llave':'Voluntario'}</div>
        </div>
        <div class="vol-list-actions">
          <button class="btn btn-ghost btn-sm" onclick="verTurnos('${nombre}')">📋 Ver turnos</button>
        </div>`;
      cont.appendChild(el);
    });
    window._volsOk = true;
  } catch(e) {
    cont.innerHTML = `<div class="empty-state"><span class="ei">⚠️</span><h4>Error</h4><p>${e.message}</p></div>`;
  }
}

async function verTurnos(nombre) {
  try {
    const data = await apiGet({action:'getTurnosVoluntario', nombre});
    if (data.error) throw new Error(data.error);
    const titulo = document.getElementById('modal-titulo');
    const body   = document.getElementById('modal-body');
    titulo.textContent = `📋 Turnos de ${nombre}`;
    if (!data.turnos?.length) {
      body.innerHTML = `<p style="text-align:center;color:var(--label3);font-size:0.85rem;">Sin turnos confirmados.</p>`;
    } else {
      body.innerHTML = `
        <table class="hist-table" style="margin-top:0.5rem;">
          <thead><tr><th>Fecha</th><th>Día</th><th>Turno</th></tr></thead>
          <tbody>${data.turnos.map(t=>`<tr><td>${t.fecha}</td><td>${t.dia}</td><td>${t.rango}</td></tr>`).join('')}</tbody>
        </table>`;
    }
    abrirModal('modal-cubre');
  } catch(e) { toast('Error: '+e.message,'err'); }
}

function abrirModalVol() {
  document.getElementById('vol-nombre').value = '';
  document.getElementById('vol-llave').value = 'no';
  document.getElementById('modal-vol-titulo').textContent = 'Nuevo voluntario';
  abrirModal('modal-vol');
}

async function guardarVoluntario() {
  const nombre = document.getElementById('vol-nombre').value.trim();
  if (!nombre) { toast('Introduce un nombre', 'err'); return; }
  toast(`Voluntario "${nombre}" registrado. Recuerda añadir su disponibilidad en el Sheet.`, 'ok');
  cerrarModal('modal-vol');
  window._volsOk = false;
  if (tabActual === 'voluntarios') cargarVoluntarios(true);
}

// ══════════════════════════════════════════════════════════
//  HISTORIAL
// ══════════════════════════════════════════════════════════
async function cargarHistorial(force) {
  if (window._histOk && !force) return;
  const cont = document.getElementById('tab-historial');
  cont.innerHTML = `<div class="loading"><div class="spinner"></div><p>Cargando historial…</p></div>`;
  try {
    const data = await apiGet({action:'getHistorial'});
    if (data.error) throw new Error(data.error);
    cont.innerHTML = '';
    if (!data.length) {
      cont.innerHTML = `<div class="empty-state"><span class="ei">📋</span><h4>Sin registros</h4><p>Confirma turnos para que aparezcan aquí.</p></div>`;
      return;
    }

    // Filtros
    const filtros = document.createElement('div');
    filtros.style.cssText = 'display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;';
    filtros.innerHTML = `
      <input class="form-control" id="hist-busca" placeholder="Buscar voluntario…" oninput="filtrarHistorial()" style="max-width:220px;">
      <select class="form-control" id="hist-dia" onchange="filtrarHistorial()" style="max-width:150px;">
        <option value="">Todos los días</option>
        ${[...new Set(data.map(r=>r.dia))].map(d=>`<option>${d}</option>`).join('')}
      </select>`;
    cont.appendChild(filtros);

    const wrap = document.createElement('div');
    wrap.className = 'card';
    wrap.innerHTML = `
      <table class="hist-table" id="hist-tabla">
        <thead><tr><th>Fecha</th><th>Día</th><th>Turno</th><th>Voluntario</th></tr></thead>
        <tbody id="hist-body">
          ${data.slice().reverse().map(r=>`
            <tr>
              <td>${r.fecha}</td>
              <td>${r.dia}</td>
              <td>${r.rango}</td>
              <td>${r.nombre}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    cont.appendChild(wrap);
    window._histData = data;
    window._histOk = true;
  } catch(e) {
    cont.innerHTML = `<div class="empty-state"><span class="ei">⚠️</span><h4>Error</h4><p>${e.message}</p></div>`;
  }
}

function filtrarHistorial() {
  const busca = document.getElementById('hist-busca')?.value.toLowerCase() || '';
  const dia   = document.getElementById('hist-dia')?.value || '';
  const filas = document.querySelectorAll('#hist-body tr');
  filas.forEach(tr => {
    const tds = tr.querySelectorAll('td');
    const okBusca = !busca || tds[3]?.textContent.toLowerCase().includes(busca);
    const okDia   = !dia   || tds[1]?.textContent === dia;
    tr.style.display = (okBusca && okDia) ? '' : 'none';
  });
}

// ══════════════════════════════════════════════════════════
//  MODAL QUIÉN CUBRE
// ══════════════════════════════════════════════════════════
async function abrirCubre(semana, dia, rango) {
  document.getElementById('modal-titulo').textContent = `🔄 ¿Quién puede cubrir? ${rango}`;
  document.getElementById('modal-body').innerHTML = `<div class="loading" style="padding:2rem 0"><div class="spinner"></div><p>Buscando candidatos…</p></div>`;
  abrirModal('modal-cubre');
  try {
    const data = await apiGet({action:'quienCubre', semana, dia, rango});
    if (data.error) throw new Error(data.error);
    if (!data.candidatos?.length) {
      document.getElementById('modal-body').innerHTML = `<p style="text-align:center;color:var(--label3);font-size:0.85rem;">Sin candidatos disponibles.</p>`;
      return;
    }
    const grupos = { disponible:[], reducido:[], bloqueado:[] };
    data.candidatos.forEach(c => grupos[c.estado].push(c));
    let html = '';
    [['disponible','✅ Disponibles'],['reducido','⚡ Descanso reducido'],['bloqueado','🔒 Bloqueados']].forEach(([k,lbl]) => {
      if (!grupos[k].length) return;
      html += `<div class="cubre-section-label">${lbl}</div>`;
      grupos[k].forEach(c => {
        html += `<div class="cubre-row">
          <div class="cubre-dot est-${c.estado}"></div>
          <div class="cubre-info">
            <div class="cubre-nombre">${c.llave?'🔑 ':''}${c.nombre}</div>
            <div class="cubre-meta">🕐 ${c.horario} · ${c.dias>=99?'Nuevo':c.dias+' d descanso'} · ${c.dispo} d/mes</div>
          </div>
        </div>`;
      });
    });
    document.getElementById('modal-body').innerHTML = html;
  } catch(e) {
    document.getElementById('modal-body').innerHTML = `<p style="color:var(--red);font-size:0.85rem;">Error: ${e.message}</p>`;
  }
}

async function exportarCuadrante() {
  try {
    const data = await apiGet({action:'exportarCuadrante'});
    toast(data.message || 'Exportado ✓', 'ok');
  } catch(e) { toast('Error: '+e.message,'err'); }
}

function imprimirCuadrante() {
  if (!state.cuadrante) { toast('Carga el cuadrante primero','err'); return; }
  const printDiv = document.getElementById('cuadrante-print');
  printDiv.innerHTML = generarPrintHTML(state.cuadrante);
  window.print();
}

function generarPrintHTML(plan) {
  const hoy = new Date();
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mes = meses[hoy.getMonth()].toUpperCase();
  const anio = hoy.getFullYear();

  let bloques = '';
  plan.forEach(d => {
    const turnos = (d.turnos || []).filter(t => !t.sinLlave && t.equipo?.length);
    if (!turnos.length) return;

    // Extraer nombre del día (Viernes 9, Sábado 10, etc.)
    const partes = d.fechaLabel.split(' - ');
    const fechaStr = partes[0] || d.fechaLabel;
    const diaNom = partes[1] || '';

    // Formatear fecha como "Viernes 9"
    const fecha = new Date(d.fechaRaw);
    const diasSemana = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const fechaFormato = `${diasSemana[fecha.getDay()]} ${fecha.getDate()}`;

    const turnosHTML = turnos.map(t => {
      const vols = (state.turnosEditados[`${d.semana}|${d.dia}|${t.rango}`] || t.equipo);
      const volsHTML = vols.map(v => `
        <span class="ptr-vol ${v.llave?'llave':''}">
          ${v.llave?'<span class="llave-icon">🔑</span> ':''}${v.nombre}
        </span>`).join('');
      return `
        <div class="print-turno-row">
          <div class="ptr-hora">
            <div class="ph-label">TURNO</div>
            <div class="ph-time">${t.rango}</div>
          </div>
          <div class="ptr-vols">${volsHTML}</div>
        </div>`;
    }).join('');

    bloques += `
      <div class="print-dia-block" style="margin-bottom:8px;">
        <div class="print-dia-info">
          <div class="pdi-fecha">${fechaFormato}</div>
        </div>
        <div class="print-turnos">${turnosHTML}</div>
      </div>`;
  });

  return `
    <div class="print-wrap">
      <div class="print-titulo">PROGRAMA PREDICACIÓN PUERTO - ${mes}</div>
      ${bloques}
      <div class="print-nota">
        <strong>Nota:</strong> El nombre sombreado en naranja indica que el voluntario <strong style="color:#f5a400">tiene llave</strong>
        y por tanto es responsable de recoger y depositar los expositores en el salón del reino de La Oliva.
      </div>
      <div class="print-contacto">
        Si por algún motivo no podéis atender vuestro turno, contactar con <strong>MANUEL FERNÁNDEZ</strong>
        enviando un mensaje privado por Whatsapp al <strong>622 71 45 85</strong>.
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════
//  MODALES / UTILIDADES
// ══════════════════════════════════════════════════════════
function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === e.currentTarget) m.classList.remove('open'); });
});

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

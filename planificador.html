<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador · Puerto de Sevilla</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #0f1f38;
  --ocean:  #1a3a5c;
  --gold:   #c9a84c;
  --amber:  #e07b00;
  --dawn:   #f5f0e8;
  --mist:   #eef2f7;
  --ink:    #1c2b3a;
  --slate:  #5c7a96;
  --white:  #ffffff;
  --red:    #c0392b;
  --green:  #1e7d5a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--dawn);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--ocean) 100%);
  padding: 2.5rem 1.5rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.site-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: var(--white);
  letter-spacing: 0.02em;
  position: relative;
}
.site-header p {
  color: rgba(255,255,255,0.55);
  font-size: 0.85rem;
  margin-top: 0.35rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  position: relative;
}
.gold-line {
  width: 48px; height: 3px;
  background: var(--gold);
  margin: 1rem auto 0;
  border-radius: 2px;
  position: relative;
}

/* ── TOOLBAR ── */
.toolbar {
  background: var(--white);
  border-bottom: 1px solid #dde3ec;
  padding: 1rem 1.5rem;
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.btn-main {
  background: var(--navy);
  color: var(--white);
  border: none;
  padding: 0.65rem 1.5rem;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.btn-main:hover { background: var(--ocean); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,31,56,0.25); }
.btn-main:active { transform: translateY(0); }
.btn-ghost {
  background: transparent;
  color: var(--navy);
  border: 1.5px solid #c5cfe0;
  padding: 0.65rem 1.2rem;
  border-radius: 8px;
  font-weight: 500;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--navy); background: var(--mist); }

.manual-panel {
  display: none;
  background: var(--mist);
  border: 1px solid #dde3ec;
  border-radius: 10px;
  padding: 0.75rem 1rem;
  gap: 0.6rem;
  align-items: center;
  flex-wrap: wrap;
  width: 100%;
  justify-content: center;
}
.manual-panel.visible { display: flex; }
.manual-panel select {
  border: 1.5px solid #c5cfe0;
  border-radius: 7px;
  padding: 0.45rem 0.8rem;
  font-size: 0.88rem;
  color: var(--ink);
  background: var(--white);
  cursor: pointer;
}
.btn-ir {
  background: var(--gold);
  color: var(--navy);
  border: none;
  padding: 0.5rem 1.1rem;
  border-radius: 7px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ir:hover { background: #b8962e; }

/* ── MAIN CONTENT ── */
.main-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

/* ── SPINNER ── */
.spinner-wrap {
  text-align: center;
  padding: 5rem 0;
}
.spinner-ring {
  width: 52px; height: 52px;
  border: 4px solid #dde3ec;
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-wrap p { color: var(--slate); font-size: 0.9rem; }

/* ── DÍA HEADER ── */
.dia-header {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin: 2.5rem 0 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 2px solid var(--navy);
}
.dia-header h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: var(--navy);
}
.dia-badge {
  background: var(--navy);
  color: var(--gold);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
}

/* ── TARJETA TURNO ── */
.turno-card {
  background: var(--white);
  border-radius: 14px;
  box-shadow: 0 2px 16px rgba(15,31,56,0.07);
  margin-bottom: 1.25rem;
  overflow: hidden;
  border: 1px solid #e4eaf3;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.turno-stripe {
  height: 5px;
}
.stripe-manana { background: linear-gradient(90deg, #1a6fc4, #4fa3e0); }
.stripe-tarde  { background: linear-gradient(90deg, var(--amber), #f5a623); }

.turno-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.1rem 1.4rem 0.6rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.turno-hora {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: var(--navy);
  line-height: 1;
}
.turno-tipo {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.2rem 0.65rem;
  border-radius: 4px;
  margin-top: 0.3rem;
}
.tipo-manana { background: #e8f1fc; color: #1a6fc4; }
.tipo-tarde  { background: #fff3e0; color: var(--amber); }

.btn-confirmar {
  background: var(--green);
  color: var(--white);
  border: none;
  padding: 0.6rem 1.4rem;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-confirmar:hover { background: #165c42; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,125,90,0.3); }
.btn-confirmar:disabled { background: #9db5b0; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-confirmar.saved { background: #888; }

.turno-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  padding: 0 1.4rem 1.4rem;
}
@media (max-width: 600px) {
  .turno-body { grid-template-columns: 1fr; }
  .turno-divider { display: none; }
}
.turno-section { padding: 0.5rem 0; }
.turno-section + .turno-section { border-left: 1px solid #edf0f5; padding-left: 1.25rem; margin-left: 0.25rem; }
.section-label {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--slate);
  margin-bottom: 0.6rem;
}
.voluntario-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 0.7rem;
  border-radius: 8px;
  background: var(--mist);
  margin-bottom: 0.4rem;
  transition: background 0.15s;
}
.voluntario-item:hover { background: #e4ecf8; }
.v-nombre {
  font-weight: 600;
  color: var(--ink);
  font-size: 0.9rem;
}
.v-meta {
  font-size: 0.7rem;
  color: var(--slate);
  margin-top: 0.1rem;
}
.badge-llave {
  background: var(--navy);
  color: var(--gold);
  font-size: 0.62rem;
  font-weight: 700;
  padding: 0.18rem 0.5rem;
  border-radius: 4px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
}
.sust-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: #f0f4fb;
  border: 1px solid #dde3ec;
  color: var(--ink);
  font-size: 0.75rem;
  padding: 0.28rem 0.65rem;
  border-radius: 20px;
  margin: 0.2rem 0.2rem 0 0;
}
.sust-chip .s-meta { font-size: 0.62rem; color: var(--slate); }

/* ── ALERTA SIN LLAVE ── */
.alerta-llave {
  background: #fff8e1;
  border: 1.5px solid #ffe082;
  border-radius: 10px;
  padding: 0.8rem 1.1rem;
  margin-bottom: 1rem;
  font-size: 0.85rem;
  color: #7a5c00;
}
.alerta-llave strong { display: block; margin-bottom: 0.2rem; }

/* ── AVISO DEGRADED ── */
.aviso-degraded {
  background: #fff3cd;
  border-left: 4px solid var(--amber);
  border-radius: 0 8px 8px 0;
  padding: 0.65rem 1rem;
  margin-bottom: 1rem;
  font-size: 0.84rem;
  font-weight: 600;
  color: #7a4500;
}

/* ── DÍA SIN TURNOS ── */
.sin-turnos {
  background: var(--white);
  border: 2px dashed #c5cfe0;
  border-radius: 12px;
  padding: 1.5rem 1.5rem;
  text-align: center;
  color: var(--slate);
}
.sin-turnos h5 { font-weight: 700; margin-bottom: 0.4rem; }
.sin-turnos .blocked-list { font-size: 0.8rem; margin-top: 0.6rem; color: #8a9bb0; }

/* ── TOAST ── */
.toast-wrap {
  position: fixed;
  bottom: 2rem;
  right: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast-msg {
  background: var(--navy);
  color: var(--white);
  padding: 0.75rem 1.25rem;
  border-radius: 10px;
  font-size: 0.85rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: slideIn 0.3s ease;
  max-width: 320px;
}
.toast-msg.ok  { border-left: 4px solid #2ecc71; }
.toast-msg.err { border-left: 4px solid #e74c3c; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>

<header class="site-header">
  <h1>🚢 Planificador de Turnos</h1>
  <p>Puerto de Sevilla · Gestión de voluntarios</p>
  <div class="gold-line"></div>
</header>

<div class="toolbar">
  <button class="btn-main" onclick="proyectarMes()">
    <span>📅</span> Proyectar mes completo
  </button>
  <button class="btn-ghost" onclick="toggleManual()">🔍 Búsqueda manual</button>

  <div class="manual-panel" id="manual-panel">
    <select id="sem">
      <option value="1">Semana 1</option><option value="2">Semana 2</option>
      <option value="3">Semana 3</option><option value="4">Semana 4</option>
      <option value="5">Semana 5</option>
    </select>
    <select id="dia">
      <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
      <option value="Miercoles">Miércoles</option><option value="Jueves">Jueves</option>
      <option value="Viernes">Viernes</option><option value="Sabado">Sábado</option>
      <option value="Domingo">Domingo</option>
    </select>
    <button class="btn-ir" onclick="buscarManual()">IR →</button>
  </div>
</div>

<div class="main-content" id="resultados">
  <div style="text-align:center; padding: 5rem 0; color: var(--slate);">
    <div style="font-size:3rem; margin-bottom: 1rem;">⚓</div>
    <p>Pulsa <strong>Proyectar mes completo</strong> para generar el cuadrante<br>o usa la búsqueda manual para un día concreto.</p>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWWRqBRJkgVenOCzNVa82BQRryCKtXXMzCqDQMBJzQnmfMpBYOfu7cBBZAnoPNgC4A/exec";

function toggleManual() {
  document.getElementById('manual-panel').classList.toggle('visible');
}

// ── PROYECTAR MES
async function proyectarMes() {
  const cont = document.getElementById('resultados');
  cont.innerHTML = `<div class="spinner-wrap"><div class="spinner-ring"></div><p>Calculando cuadrante mensual...</p></div>`;
  try {
    const res = await fetch(`${API_URL}?action=getCuadranteMensual`, {
      redirect: 'follow',
      headers: { 'Accept': 'application/json' }
    });

    // Leer como texto primero para poder depurar
    const texto = await res.text();

    // Limpiar posibles caracteres basura al inicio
    const textoLimpio = texto.trim().replace(/^[^\[{]+/, '');

    let data;
    try {
      data = JSON.parse(textoLimpio);
    } catch(parseErr) {
      // Mostrar los primeros 300 caracteres para diagnosticar
      console.error('Respuesta raw:', texto.substring(0, 300));
      throw new Error(`Respuesta inesperada del servidor. Primeros caracteres: "${texto.substring(0, 80)}"`);
    }

    if (data.error) throw new Error(data.error);
    cont.innerHTML = "";
    if (!data.length) {
      cont.innerHTML = `<div class="sin-turnos"><h5>Sin días configurados</h5><p>No hay días activos en el calendario.</p></div>`;
      return;
    }
    data.forEach(d => renderizarDia(d, cont));
  } catch (e) {
    cont.innerHTML = `<div class="sin-turnos" style="border-color:#f5c6cb; color:#842029;"><h5>⚠️ Error al cargar</h5><p>${e.message}</p></div>`;
  }
}

// ── BÚSQUEDA MANUAL
async function buscarManual() {
  const s    = document.getElementById('sem').value;
  const d    = document.getElementById('dia').value;
  const cont = document.getElementById('resultados');
  cont.innerHTML = `<div class="spinner-wrap"><div class="spinner-ring"></div><p>Buscando disponibilidad...</p></div>`;
  try {
    const res  = await fetch(`${API_URL}?action=getSmartCuadrante&semana=${s}&dia=${d}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    cont.innerHTML = "";
    // Adaptar al formato esperado por renderizarDia
    renderizarDia({ fechaLabel: `${d} (Semana ${s})`, semana: s, dia: d, turnos: data.turnos || data, diagnostico: data.diagnostico || {} }, cont);
  } catch (e) {
    cont.innerHTML = `<div class="sin-turnos" style="border-color:#f5c6cb; color:#842029;"><h5>⚠️ Error</h5><p>${e.message}</p></div>`;
  }
}

// ── RENDERIZAR UN DÍA
function renderizarDia(diaData, contenedor) {
  const turnos = diaData.turnos || [];
  const diag   = diaData.diagnostico || {};

  // Cabecera del día
  const hdr = document.createElement('div');
  hdr.className = 'dia-header';
  hdr.innerHTML = `<h3>📅 ${diaData.fechaLabel}</h3><span class="dia-badge">${turnos.length} turno${turnos.length !== 1 ? 's' : ''}</span>`;
  contenedor.appendChild(hdr);

  // Aviso descanso degradado
  if (diag.aviso) {
    const av = document.createElement('div');
    av.className = 'aviso-degraded';
    av.textContent = diag.aviso;
    contenedor.appendChild(av);
  }

  // Sin turnos
  if (turnos.length === 0) {
    const st = document.createElement('div');
    st.className = 'sin-turnos';
    st.innerHTML = `
      <h5>⚠️ Sin cuadrante disponible</h5>
      <p>No hay franjas con solapamiento suficiente (mín. 3 personas).</p>
      ${diag.bloqueados && diag.bloqueados.length
        ? `<div class="blocked-list">🔒 Bloqueados por descanso: ${diag.bloqueados.join(' · ')}</div>`
        : ''}
      <div class="blocked-list mt-1">Disponibles totales: ${diag.totalDisponibles || 0} · Aptos: ${diag.aptos || 0}</div>`;
    contenedor.appendChild(st);
    return;
  }

  // Turnos
  turnos.forEach(t => {
    const hIni   = parseInt(t.rango.split(':')[0]);
    const esTarde = hIni >= 14;
    const card   = document.createElement('div');
    card.className = 'turno-card';

    // Turno sin llave → alerta especial
    if (t.sinLlave) {
      card.innerHTML = `
        <div class="turno-stripe stripe-${esTarde ? 'tarde' : 'manana'}"></div>
        <div class="turno-header">
          <div>
            <div class="turno-hora">🕒 ${t.rango}</div>
            <span class="turno-tipo tipo-${esTarde ? 'tarde' : 'manana'}">${esTarde ? 'TARDE' : 'MAÑANA'}</span>
          </div>
        </div>
        <div style="padding: 0 1.4rem 1.4rem;">
          <div class="alerta-llave">
            <strong>🔑 Sin portador de llave disponible</strong>
            Este turno no puede confirmarse: ninguno de los ${t.sustitutos.length} voluntarios disponibles tiene llave.
            Se muestran como sustitutos por si se resuelve.
          </div>
          <div class="section-label">Voluntarios disponibles (sin llave)</div>
          <div style="display:flex; flex-wrap:wrap; gap:0.3rem;">
            ${t.sustitutos.map(s => `
              <span class="sust-chip">${s.nombre} <span class="s-meta">${s.dias >= 99 ? 'Nuevo' : s.dias + 'd'}</span></span>
            `).join('')}
          </div>
        </div>`;
      contenedor.appendChild(card);
      return;
    }

    const equipoHtml = t.equipo.map(v => `
      <div class="voluntario-item">
        <div>
          <div class="v-nombre">${v.nombre}</div>
          <div class="v-meta">Descanso: <strong>${v.dias >= 99 ? 'Nuevo' : v.dias + ' días'}</strong> · Disponib.: <strong>${v.dispo}d/mes</strong></div>
        </div>
        ${v.llave ? '<span class="badge-llave">🔑 Llave</span>' : ''}
      </div>`).join('');

    const sustHtml = t.sustitutos.length
      ? t.sustitutos.map(s => `
          <span class="sust-chip">
            ${s.llave ? '🔑 ' : ''}${s.nombre}
            <span class="s-meta">${s.dias >= 99 ? 'Nuevo' : s.dias + 'd'} · ${s.dispo}d</span>
          </span>`).join('')
      : '<span style="font-size:0.8rem; color: var(--slate);">—</span>';

    const btnId = `btn-${diaData.semana}-${diaData.dia}-${hIni}`;
    card.innerHTML = `
      <div class="turno-stripe stripe-${esTarde ? 'tarde' : 'manana'}"></div>
      <div class="turno-header">
        <div>
          <div class="turno-hora">🕒 ${t.rango}</div>
          <span class="turno-tipo tipo-${esTarde ? 'tarde' : 'manana'}">${esTarde ? 'TARDE' : 'MAÑANA'}</span>
        </div>
        <button class="btn-confirmar" id="${btnId}"
          onclick="confirmarTurno('${diaData.semana}', '${diaData.dia}', '${t.equipo.map(e => e.nombre).join(',')}', '${t.rango}', ${diaData.fechaRaw || 'null'}, '${btnId}')">
          ✓ Confirmar turno
        </button>
      </div>
      <div class="turno-body">
        <div class="turno-section">
          <div class="section-label">Equipo asignado (${t.equipo.length})</div>
          ${equipoHtml}
        </div>
        <div class="turno-section">
          <div class="section-label">Disponibles adicionales (${t.sustitutos.length})</div>
          <div style="display:flex; flex-wrap:wrap; padding-top:0.3rem;">${sustHtml}</div>
        </div>
      </div>`;
    contenedor.appendChild(card);
  });
}

// ── CONFIRMAR TURNO
async function confirmarTurno(semana, dia, nombresStr, rango, fechaRaw, btnId) {
  if (!confirm(`¿Guardar este turno (${rango}) en el historial?`)) return;

  const btn = document.getElementById(btnId);
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        accion:    'confirmarTurno',
        semana,
        dia,
        asignados: nombresStr.split(','),
        rango,
        fecha:     fechaRaw ? new Date(fechaRaw).toISOString() : new Date().toISOString()
      })
    });
    btn.textContent = '✓ Guardado';
    btn.classList.add('saved');
    toast('Turno guardado en historial ✓', 'ok');
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '✓ Confirmar turno';
    toast('Error al guardar: ' + e.message, 'err');
  }
}

// ── TOAST
function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
</script>
